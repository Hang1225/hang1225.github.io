<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>社区 — 二十五</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .comment-card {
      padding: 1.5rem;
      border-left: 2px solid var(--border);
      margin-bottom: 1.25rem;
      transition: border-color 0.2s;
    }
    .comment-card:hover { border-left-color: var(--gold-dim, rgba(201,168,76,0.35)); }
    .comment-meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 0.6rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .comment-name {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: var(--cream);
    }
    .comment-date { font-size: 0.82rem; color: var(--muted); font-style: italic; }
    .comment-text { line-height: 1.75; font-size: 1rem; }
  </style>
</head>
<body>
  <div id="nav"></div>
  <main>
    <div class="page-header fade-in">
      <span class="eyebrow">宾客评价</span>
      <h1>社区</h1>
      <p>听听宾客怎么说</p>
    </div>

    <div id="comments-list" class="fade-in-2"></div>

    <div class="rule fade-in-3"><span>◆</span></div>

    <div class="card fade-in-3">
      <span class="eyebrow">留下评价</span>
      <h2 style="margin-bottom:1.25rem">分享您的体验</h2>
      <input type="text" id="author" placeholder="您的名字（可选）">
      <textarea id="body" rows="4" placeholder="告诉我们您的感受…"></textarea>
      <button class="btn btn-solid" id="submit-btn">提交评价</button>
      <span id="status"></span>
    </div>
  </main>
  <div id="footer"></div>
  <script type="module">
    import { requirePasscode } from './js/auth.js'
    import { renderNav, renderFooter } from './js/nav.js'
    import { loadGeneralComments, submitGeneralComment } from './js/community.js'

    requirePasscode()
    document.getElementById('nav').innerHTML = renderNav('社区')
    document.getElementById('footer').innerHTML = renderFooter()

    function escapeHtml(str) {
      if (!str) return ''
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')
    }

    const comments = await loadGeneralComments()
    const list = document.getElementById('comments-list')

    if (comments.length === 0) {
      list.innerHTML = '<p class="muted" style="font-style:italic">暂无评价，成为第一个留言的人</p>'
    } else {
      comments.forEach(c => {
        const div = document.createElement('div')
        div.className = 'comment-card'
        div.innerHTML = `
          <div class="comment-meta">
            <span class="comment-name">${escapeHtml(c.author_name) || 'Anonymous'}</span>
            <span class="comment-date">${new Date(c.created_at).toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' })}</span>
          </div>
          <p class="comment-text">${escapeHtml(c.body)}</p>
        `
        list.appendChild(div)
      })
    }

    document.getElementById('submit-btn').addEventListener('click', async () => {
      const author = document.getElementById('author').value.trim()
      const body = document.getElementById('body').value.trim()
      const status = document.getElementById('status')
      if (!body) { status.textContent = '请写下您的感受'; status.className = 'error'; return }
      const ok = await submitGeneralComment(author || null, body)
      if (ok) {
        status.textContent = '感谢评价，待审核后显示'
        status.className = 'success'
        document.getElementById('body').value = ''
      } else {
        status.textContent = '出现错误，请重试'
        status.className = 'error'
      }
    })
  </script>
</body>
</html>
