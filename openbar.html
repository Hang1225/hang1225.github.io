<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open Bar — 二十五</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-container { max-width: 460px; margin: 0 auto; }
    .auth-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }
    .auth-tab {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 0.7rem 1.25rem;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      margin-bottom: -1px;
    }
    .auth-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
    .auth-panel { display: none; }
    .auth-panel.active { display: block; animation: fadeUp 0.3s ease both; }

    .dashboard { max-width: 720px; margin: 0 auto; }
    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 1rem;
    }
    .dashboard-name { font-size: clamp(1.5rem, 4vw, 2.2rem); color: var(--cream); margin-bottom: 0.3rem; }
    .wishlist-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.65rem 0;
      border-bottom: 1px solid rgba(201,168,76,0.08);
    }
    .wishlist-row:last-child { border: none; }
    .wishlist-name { color: var(--text); }

/* ---- EVENTS (pre-login public cards) ---- */
.event-public-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.1rem 1.35rem;
  margin-bottom: 0.6rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  flex-wrap: wrap;
  position: relative;
}
.event-public-card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(201,168,76,0.025), transparent 55%);
  pointer-events: none;
  border-radius: var(--radius);
}
.event-date {
  font-family: 'Cinzel', serif;
  font-size: 0.65rem;
  letter-spacing: 0.18em;
  color: var(--gold);
  margin-bottom: 0.12rem;
}
.event-title-text {
  font-family: 'Playfair Display', serif;
  font-size: 1.05rem;
  color: var(--cream);
}
.event-meta {
  display: flex;
  align-items: center;
  gap: 0.55rem;
  margin-top: 0.35rem;
  flex-wrap: wrap;
}
.slot-meter { display: flex; gap: 3px; align-items: center; }
.slot-pip {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: transparent;
}
.slot-pip.filled { background: var(--gold); border-color: var(--gold); }
.slot-label {
  font-family: 'Cinzel', serif;
  font-size: 0.55rem;
  letter-spacing: 0.1em;
  color: var(--muted);
  margin-left: 0.3rem;
}
.badge-curated {
  background: rgba(184,156,216,0.12);
  border: 1px solid rgba(184,156,216,0.3);
  color: #B89CD8;
}

/* ---- EVENT ROWS (dashboard Events card) ---- */
.event-row {
  padding: 1rem 0;
  border-bottom: 1px solid rgba(201,168,76,0.07);
}
.event-row:last-child { border-bottom: none; padding-bottom: 0; }
.event-row-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 1rem;
  flex-wrap: wrap;
}
.res-confirmed { font-family: 'Cinzel', serif; font-size: 0.62rem; letter-spacing: 0.1em; color: var(--green); }
.res-waitlisted { font-family: 'Cinzel', serif; font-size: 0.62rem; letter-spacing: 0.1em; color: #C9A030; }
.res-interested { font-family: 'Cinzel', serif; font-size: 0.62rem; letter-spacing: 0.1em; color: #B89CD8; }
.event-note { font-style: italic; color: var(--muted); font-size: 0.83rem; margin-top: 0.45rem; }
.event-note span { color: var(--text); }
.btn-ghost { border-color: var(--border); color: var(--muted); background: transparent; }
.badge-green { background: rgba(106,158,120,0.12); border-color: rgba(106,158,120,0.3); color: var(--green); }
.badge-red   { background: rgba(192,96,96,0.12);   border-color: rgba(192,96,96,0.3);   color: #c06060; }
.badge-muted { background: rgba(106,94,74,0.1);    border-color: rgba(106,94,74,0.25);  color: var(--muted); }

/* ---- INLINE RESERVATION FORM ---- */
.inline-form {
  display: none;
  margin-top: 0.85rem;
  padding-top: 0.85rem;
  border-top: 1px solid rgba(201,168,76,0.08);
}
.form-sublabel {
  font-family: 'Cinzel', serif;
  font-size: 0.5rem;
  letter-spacing: 0.14em;
  color: var(--muted);
  display: block;
  margin-bottom: 0.35rem;
}
.guest-toggle { display: flex; gap: 0.4rem; flex-wrap: wrap; align-items: center; margin-bottom: 0.65rem; }
.guest-opt {
  font-family: 'Cinzel', serif;
  font-size: 0.52rem;
  letter-spacing: 0.1em;
  padding: 0.3rem 0.75rem;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--muted);
  cursor: pointer;
  background: transparent;
}
.guest-opt.active { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.07); }
textarea.event-message {
  width: 100%;
  background: rgba(255,255,255,0.025);
  border: 1px solid rgba(201,168,76,0.14);
  border-radius: var(--radius);
  padding: 0.65rem 1rem;
  color: var(--text);
  font-family: 'Cormorant Garamond', serif;
  font-size: 1rem;
  margin-bottom: 0.75rem;
  resize: vertical;
  min-height: 68px;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
}
textarea.event-message:focus {
  border-color: var(--gold-dim);
  background: rgba(201,168,76,0.04);
}
textarea.event-message::placeholder { color: var(--muted); font-style: italic; }
.form-hint { font-style: italic; color: var(--muted); font-size: 0.85rem; margin-bottom: 0.7rem; }

/* ---- HISTORY ---- */
.history-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.7rem 0;
  border-bottom: 1px solid rgba(201,168,76,0.07);
  gap: 1rem;
  flex-wrap: wrap;
}
.history-row:last-child { border-bottom: none; }
.history-date {
  font-family: 'Cinzel', serif;
  font-size: 0.5rem;
  letter-spacing: 0.14em;
  color: var(--muted);
  margin-bottom: 0.1rem;
}

/* ---- GUEST LIST DISPLAY ---- */
.event-guest-list {
  margin-top: 0.75rem;
  padding-top: 0.65rem;
  border-top: 1px solid rgba(201,168,76,0.07);
}
.event-guest-label {
  font-family: 'Cinzel', serif;
  font-size: 0.48rem;
  letter-spacing: 0.14em;
  color: var(--muted);
  display: block;
  margin-bottom: 0.45rem;
}
.guest-pills { display: flex; flex-wrap: wrap; gap: 0.2rem; }
.guest-pill {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  padding: 0.24rem 0.55rem;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 0.88rem;
  color: var(--text);
}
.g-badge {
  font-family: 'Cinzel', serif;
  font-size: 0.42rem;
  letter-spacing: 0.06em;
  padding: 0.08rem 0.32rem;
  border-radius: 2px;
  display: inline-block;
}
.g-m { background: rgba(100,140,200,0.15); border: 1px solid rgba(100,140,200,0.3); color: #8AABE0; }
.g-f { background: rgba(200,120,160,0.15); border: 1px solid rgba(200,120,160,0.3); color: #D888B0; }
.g-nb { background: rgba(140,160,120,0.15); border: 1px solid rgba(140,160,120,0.3); color: #A0BE90; }
.g-hidden { background: rgba(106,94,74,0.1); border: 1px solid rgba(106,94,74,0.2); color: var(--muted); }
.g-mbti { background: rgba(160,140,100,0.12); border: 1px solid rgba(160,140,100,0.25); color: var(--muted); }

/* ── SIGNUP: Gender pills ── */
.signup-field-label {
  font-family: 'Cinzel', serif;
  font-size: 0.46rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  display: block;
  margin-bottom: 0.6rem;
  margin-top: 0.1rem;
}
.gender-pills {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0.4rem;
  margin-bottom: 0.85rem;
}
.gender-pill {
  font-family: 'Cormorant Garamond', 'Noto Serif SC', serif;
  font-size: 0.72rem;
  padding: 0.4rem 0.4rem;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  white-space: nowrap;
  line-height: 1.3;
}
.gender-pill:hover { border-color: var(--gold-dim); color: var(--text); }
.gender-pill.active {
  border-color: var(--gold);
  color: var(--gold-light);
  background: rgba(201,168,76,0.08);
}
.gender-pill.active::after {
  content: ' ◆';
  font-size: 0.28rem;
  color: var(--gold-dim);
  vertical-align: middle;
}

/* ── SIGNUP: MBTI cocktail carousel ── */
.mbti-signup-tabs {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0.22rem;
  margin-bottom: 0.6rem;
}
.mbti-signup-tab {
  font-family: 'Cinzel', serif;
  font-size: 0.54rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.28rem 0;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  text-align: center;
  transition: all 0.18s;
}
.mbti-signup-tab.ta.active { border-color:#7AA0D8; color:#7AA0D8; background:rgba(122,160,216,0.07); }
.mbti-signup-tab.td.active { border-color:#A888D0; color:#A888D0; background:rgba(168,136,208,0.07); }
.mbti-signup-tab.ts.active { border-color:#5A9068; color:#5A9068; background:rgba(90,144,104,0.07); }
.mbti-signup-tab.te.active { border-color:#C9A84C; color:#C9A84C; background:rgba(201,168,76,0.07); }
.mbti-carousel-wrap {
  overflow: hidden;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: rgba(0,0,0,0.18);
  margin-bottom: 0;
}
.mbti-carousel-track {
  display: flex;
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
  cursor: grab;
}
.mbti-carousel-track.dragging { cursor: grabbing; transition: none; }
.mbti-carousel-slide {
  min-width: 100%;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
}
.mbti-char-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0.75rem 0.15rem 0.6rem;
  cursor: pointer;
  border: none;
  background: transparent;
  transition: background 0.18s;
  position: relative;
  border-right: 1px solid rgba(255,255,255,0.04);
}
.mbti-char-card:last-child { border-right: none; }
.mbti-char-card:hover { background: rgba(255,255,255,0.025); }
.mbti-char-card.sel { background: rgba(var(--mbti-gr), 0.07); }
.mbti-char-card.sel::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: rgb(var(--mbti-gr));
}
.mbti-char-card svg {
  transition: transform 0.22s cubic-bezier(0.34,1.4,0.64,1);
}
.mbti-char-card:hover svg { transform: translateY(-2px) scale(1.04); }
.mbti-char-card.sel svg {
  transform: translateY(-3px) scale(1.06);
  filter: drop-shadow(0 5px 12px rgba(var(--mbti-gr), 0.35));
}
.mbti-char-name {
  font-family: 'Cinzel', serif;
  font-size: 0.6rem;
  letter-spacing: 0.08em;
  color: var(--muted);
  transition: color 0.18s;
  margin-top: 0.3rem;
}
.mbti-char-sub {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 0.5rem;
  color: var(--muted);
  opacity: 0.5;
  transition: all 0.18s;
  white-space: nowrap;
}
.mbti-char-card.sel .mbti-char-name { color: rgb(var(--mbti-gr)); }
.mbti-char-card.sel .mbti-char-sub  { opacity: 0.8; color: rgb(var(--mbti-gr)); }
.mbti-carousel-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 0.45rem;
  margin-bottom: 0.85rem;
}
.mbti-nav-arrow {
  font-family: 'Cinzel', serif;
  font-size: 0.36rem;
  color: var(--muted);
  background: transparent;
  border: none;
  cursor: pointer;
  padding: 0.2rem 0.35rem;
  transition: color 0.18s;
}
.mbti-nav-arrow:hover { color: var(--gold); }
.mbti-nav-arrow:disabled { opacity: 0.2; cursor: default; }
.mbti-nav-dots { display: flex; gap: 0.28rem; align-items: center; }
.mbti-nav-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--muted);
  opacity: 0.35;
  transition: all 0.2s;
  cursor: pointer;
}
.mbti-nav-dot.active { opacity: 1; width: 12px; border-radius: 3px; }

/* ── PROFILE: Avatar ── */
.profile-avatar {
  width: 42px; height: 42px; border-radius: 50%;
  border: 1px solid var(--gold-dim);
  background: var(--surface-2);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cinzel', serif; font-size: 0.72rem; color: var(--gold);
  cursor: pointer; flex-shrink: 0;
  box-shadow: 0 0 0 3px rgba(201,168,76,0.06);
  position: relative;
  transition: box-shadow 0.2s;
}
.profile-avatar:hover { box-shadow: 0 0 0 4px rgba(201,168,76,0.12); }
.profile-avatar-pencil {
  position: absolute; bottom: -3px; right: -3px;
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--surface-2); border: 1px solid var(--gold-dim);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; color: var(--gold);
}
.profile-edit-hint {
  font-family: 'Cinzel', serif;
  font-size: 0.45rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 0.22rem;
  text-align: center;
}
.profile-header-left { display: flex; gap: 0.8rem; align-items: flex-start; }
.profile-header-badges { display: flex; gap: 0.3rem; margin-top: 0.3rem; flex-wrap: wrap; }

/* ── PROFILE: Edit panel ── */
#profile-edit-panel {
  border-color: var(--gold-dim) !important;
  margin-bottom: 1rem;
  animation: fadeUp 0.22s ease both;
}
#profile-save-status { font-size: 0.85rem; min-height: 1.2em; margin-bottom: 0.5rem; }
#profile-save-status.error { color: var(--red); }
#profile-save-status.success { color: var(--green); }
  </style>
</head>
<body>
  <div id="nav"></div>
  <main>
    <!-- AUTH SECTION (login or signup) -->
    <div id="auth-section">
      <div class="page-header fade-in">
        <span class="eyebrow" data-zh="Open Bar" data-en="Open Bar">Open Bar</span>
        <h1>Open Bar</h1>
        <p data-zh="查看愿望单，登录账户" data-en="Browse the wishlist and sign in to your account">查看愿望单，登录账户</p>
      </div>

      <div class="auth-container fade-in-2">
        <div class="auth-tabs">
          <button class="auth-tab active" data-panel="login" data-zh="登录" data-en="Sign In">登录</button>
          <button class="auth-tab" data-panel="signup" data-zh="加入Open Bar" data-en="Join Open Bar">加入Open Bar</button>
        </div>

        <!-- LOGIN -->
        <div class="auth-panel active" id="panel-login">
          <div class="card">
            <input type="text" id="username"
              data-placeholder-zh="用户名" data-placeholder-en="Username"
              placeholder="用户名" autocomplete="username">
            <input type="password" id="pin" maxlength="4" pattern="\d{4}" inputmode="numeric"
              data-placeholder-zh="密码" data-placeholder-en="PIN"
              placeholder="密码" autocomplete="current-password">
            <button class="btn btn-solid" id="login-btn" style="width:100%" data-zh="登录" data-en="Sign In">登录</button>
            <span id="login-error" class="error" style="display:none"></span>
          </div>
        </div>

        <!-- SIGNUP -->
        <div class="auth-panel" id="panel-signup">
          <div class="card">
            <p style="font-style:italic;color:var(--muted);margin-bottom:1.25rem;font-size:0.95rem"
              data-zh="创建账户以查看愿望单。"
              data-en="Create an account to browse the wishlist.">
              创建账户以查看愿望单。
            </p>
            <input type="text" id="signup-username"
              data-placeholder-zh="选择用户名" data-placeholder-en="Choose a username"
              placeholder="选择用户名" autocomplete="username">
            <!-- Gender pills -->
            <input type="hidden" id="signup-gender">
            <span class="signup-field-label" data-zh="性别（可选）" data-en="Gender (optional)">性别（可选）</span>
            <div class="gender-pills">
              <button type="button" class="gender-pill" data-value="male" data-zh="男" data-en="Male" onclick="signupSelectGender(this)">男</button>
              <button type="button" class="gender-pill" data-value="female" data-zh="女" data-en="Female" onclick="signupSelectGender(this)">女</button>
              <button type="button" class="gender-pill" data-value="non-binary" data-zh="非二元" data-en="Non-binary" onclick="signupSelectGender(this)">非二元</button>
              <button type="button" class="gender-pill" data-value="prefer-not" data-zh="不透露" data-en="Private" onclick="signupSelectGender(this)">不透露</button>
            </div>

            <!-- MBTI cocktail carousel -->
            <input type="hidden" id="signup-mbti">
            <span class="signup-field-label" data-zh="MBTI（可选）" data-en="MBTI (optional)">MBTI（可选）</span>
            <div class="mbti-signup-tabs">
              <button type="button" class="mbti-signup-tab ta active" data-zh="分析家" data-en="Analysts" onclick="mbtiGoSlide(0,this)">分析家</button>
              <button type="button" class="mbti-signup-tab td" data-zh="外交家" data-en="Diplomats" onclick="mbtiGoSlide(1,this)">外交家</button>
              <button type="button" class="mbti-signup-tab ts" data-zh="守卫者" data-en="Sentinels" onclick="mbtiGoSlide(2,this)">守卫者</button>
              <button type="button" class="mbti-signup-tab te" data-zh="探险家" data-en="Explorers" onclick="mbtiGoSlide(3,this)">探险家</button>
            </div>
            <div class="mbti-carousel-wrap" id="mbti-carousel">
              <div class="mbti-carousel-track" id="mbti-track">

                <!-- Analysts (blue) -->
                <div class="mbti-carousel-slide" style="--mbti-gr:122,160,216">
                  <button type="button" class="mbti-char-card" onclick="mbtiPick(this,'INTJ')">
                    <svg width="46" height="64" viewBox="0 0 50 70" fill="none"><circle cx="25" cy="11" r="9" fill="#7AA0D8" opacity="0.92"/><rect x="17" y="9" width="6" height="4" rx="1" fill="none" stroke="#0D0D1A" stroke-width="1.2" opacity="0.55"/><rect x="27" y="9" width="6" height="4" rx="1" fill="none" stroke="#0D0D1A" stroke-width="1.2" opacity="0.55"/><line x1="23" y1="11" x2="27" y2="11" stroke="#0D0D1A" stroke-width="1" opacity="0.5"/><line x1="21" y1="16" x2="29" y2="16" stroke="#0D0D1A" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/><path d="M11 22 L39 22 L35 56 L15 56 Z" fill="#7AA0D8" opacity="0.78"/><path d="M13 34 L37 34 L35 56 L15 56 Z" fill="#7AA0D8" opacity="0.3"/><rect x="19" y="36" width="10" height="10" rx="2" fill="rgba(200,230,255,0.25)" stroke="rgba(200,230,255,0.6)" stroke-width="0.9" transform="rotate(8 24 41)"/><line x1="14" y1="24" x2="17" y2="52" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.1"/><rect x="3" y="24" width="8" height="20" rx="4" fill="#7AA0D8" opacity="0.65" transform="rotate(-6 7 34)"/><rect x="39" y="24" width="8" height="20" rx="4" fill="#7AA0D8" opacity="0.65" transform="rotate(6 43 34)"/><rect x="15" y="56" width="8" height="13" rx="4" fill="#7AA0D8" opacity="0.6"/><rect x="27" y="56" width="8" height="13" rx="4" fill="#7AA0D8" opacity="0.6"/><path d="M16 22 Q12 18 10 14 Q14 12 18 16 Q20 19 16 22Z" fill="#E2C870" opacity="0.7"/></svg>
                    <div class="mbti-char-name">INTJ</div><div class="mbti-char-sub">Negroni</div>

  <script type="module">
    import { requirePasscode, loginAttendee, getAttendeeSession, logoutAttendee, hashPin } from './js/auth.js'
    import { renderNav, renderFooter, initLang } from './js/nav.js'
    import { loadWishlist } from './js/openbar.js'
    import { supabase } from './js/supabase-client.js'
    import { t } from './js/i18n.js'
    import { loadEvents, formatTimeRange } from './js/events.js'
    import { createReservation, cancelReservation, loadAttendeeReservations, loadEventGuestList, reapplyReservation, acceptInvite, declineInvite } from './js/reservations.js'

    requirePasscode()
    document.getElementById('nav').innerHTML = renderNav('Open Bar')
    document.getElementById('footer').innerHTML = renderFooter()
    initLang()

    function escapeHtml(str) {
      if (!str) return ''
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')
    }

    // ---- HELPERS ----

    function renderSlotMeter(used, capacity) {
      const pips = Array.from({ length: capacity }, (_, i) =>
        `<span class="slot-pip${i < used ? ' filled' : ''}"></span>`
      ).join('')
      const available = capacity - used
      const label = available > 0
        ? `<span class="slot-label">${available} ${t('位', 'seats left')}</span>`
        : `<span class="slot-label" style="color:var(--muted)">${t('已满', 'Full')}</span>`
      return `<span class="slot-meter">${pips}${label}</span>`
    }

    function renderGenderBadge(gender) {
      if (!gender) return `<span class="g-badge g-hidden">—</span>`
      const cls = { male: 'g-m', female: 'g-f', 'non-binary': 'g-nb' }[gender] || 'g-hidden'
      const label = { male: 'M', female: 'F', 'non-binary': 'NB' }[gender] || '—'
      return `<span class="g-badge ${cls}">${label}</span>`
    }

    function formatEventDate(dateStr) {
      // dateStr is 'YYYY-MM-DD' — append time to avoid timezone shift
      const d = new Date(dateStr + 'T12:00:00')
      const days = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT']
      const months = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN',
                      'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC']
      return `${days[d.getDay()]} · ${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`
    }

    // ---- PRE-LOGIN EVENTS ----

    async function renderPreloginEvents() {
      const today = new Date().toISOString().split('T')[0]

      const [events, slotRes, waitRes] = await Promise.all([
        loadEvents(),
        supabase.from('reservations').select('event_id, guest_count').eq('status', 'confirmed').eq('admin_added', false),
        supabase.from('reservations').select('event_id').eq('status', 'waitlisted')
      ])

      // Aggregate slot usage and waitlist counts
      const slotsByEvent = {}
      ;(slotRes.data || []).forEach(r => {
        slotsByEvent[r.event_id] = (slotsByEvent[r.event_id] || 0) + r.guest_count
      })
      const waitByEvent = {}
      ;(waitRes.data || []).forEach(r => {
        waitByEvent[r.event_id] = (waitByEvent[r.event_id] || 0) + 1
      })

      const upcoming = events.filter(e => e.event_date >= today)
      const container = document.getElementById('events-prelogin-list')

      if (!upcoming.length) {
        container.innerHTML = `<p class="muted" style="font-style:italic">${t('暂无即将举办的活动', 'No upcoming events')}</p>`
        return
      }

      container.innerHTML = ''
      upcoming.forEach(ev => {
        const used = slotsByEvent[ev.id] || 0
        const waitCount = waitByEvent[ev.id] || 0
        const isCurated = ev.event_type === 'curated'
        const isFull = !isCurated && used >= (ev.capacity - (ev.admin_reserved || 0))

        let slotHtml = ''
        let ctaKey = ''
        if (isCurated) {
          slotHtml = `<span class="badge badge-curated">${t('策划活动 · 邀请制', 'Curated · By Invitation')}</span>`
          ctaKey = t('登录后表达意愿', 'Sign In to Express Interest')
        } else if (isFull) {
          slotHtml = renderSlotMeter(used, ev.capacity - (ev.admin_reserved || 0))
          if (waitCount) slotHtml += ` <span class="badge" style="margin-left:0.3rem">${waitCount} ${t('人等候', 'on waitlist')}</span>`
          ctaKey = t('登录加入等候', 'Sign In to Join Waitlist')
        } else {
          slotHtml = renderSlotMeter(used, ev.capacity - (ev.admin_reserved || 0))
          ctaKey = t('登录预订', 'Sign In to Reserve')
        }

        const timeRange = formatTimeRange(ev.start_time, ev.end_time)
        const card = document.createElement('div')
        card.className = 'event-public-card'
        card.innerHTML = `
          <div>
            <div class="event-date">${escapeHtml(formatEventDate(ev.event_date))}${timeRange ? ' · ' + timeRange : ''}</div>
            <div class="event-title-text">${escapeHtml(ev.title)}</div>
            <div class="event-meta">${slotHtml}</div>
          </div>
          <button class="btn btn-sm" style="opacity:0.55;cursor:default;border-color:var(--border);color:var(--muted)">${escapeHtml(ctaKey)}</button>
        `
        container.appendChild(card)
      })
    }

    renderPreloginEvents()

    // ---- DASHBOARD EVENTS + HISTORY ----

    async function loadDashboardData() {
      const today = new Date().toISOString().split('T')[0]

      const [events, res, slotRes, waitRes] = await Promise.all([
        loadEvents(),
        loadAttendeeReservations(currentAttendee.id),
        supabase.from('reservations').select('event_id, guest_count').eq('status', 'confirmed').eq('admin_added', false),
        supabase.from('reservations').select('id, event_id, created_at').eq('status', 'waitlisted')
      ])
      attendeeReservations = res

      // Slot usage by event (all attendees)
      const slotsByEvent = {}
      ;(slotRes.data || []).forEach(r => {
        slotsByEvent[r.event_id] = (slotsByEvent[r.event_id] || 0) + r.guest_count
      })

      // Waitlist positions by event (sorted by created_at ASC, position = index + 1)
      const waitlistByEvent = {}
      ;(waitRes.data || []).forEach(r => {
        if (!waitlistByEvent[r.event_id]) waitlistByEvent[r.event_id] = []
        waitlistByEvent[r.event_id].push(r)
      })
      Object.values(waitlistByEvent).forEach(arr => arr.sort((a, b) => a.created_at.localeCompare(b.created_at)))

      // This attendee's reservations indexed by event_id
      const myResByEvent = {}
      attendeeReservations.forEach(r => {
        if (!['cancelled', 'removed', 'invited', 'declined'].includes(r.status)) myResByEvent[r.event_id] = r
      })

      // Collect upcoming closed events where this guest has an active reservation
      const cancelledEvents = attendeeReservations.filter(r =>
        r.events &&
        r.events.status === 'closed' &&
        r.events.event_date >= today &&
        ['confirmed', 'waitlisted', 'interested'].includes(r.status)
      )

      const invitedReservations = attendeeReservations.filter(r =>
        r.events && r.status === 'invited'
      )
      // Exclude invited events from the upcoming list — they appear in the Invitations card instead.
      // Without this, an invited guest would see a spurious "Reserve" button for their invited event.
      // Build from all invited rows (not just those with a joined event) to cover orphaned-FK edge cases.
      const invitedEventIds = new Set(
        attendeeReservations.filter(r => r.status === 'invited').map(r => r.event_id)
      )

      // Split: upcoming events for Events card, past reservations for History card
      const upcomingEvents = events.filter(e => e.event_date >= today && !invitedEventIds.has(e.id))
      const historyRows = attendeeReservations
        .filter(r => r.events && r.events.event_date < today &&
          ['confirmed', 'removed', 'declined'].includes(r.status))
        .sort((a, b) => b.events.event_date.localeCompare(a.events.event_date))

      renderInvitations(invitedReservations)
      await renderDashboardEvents(upcomingEvents, myResByEvent, slotsByEvent, waitlistByEvent)
      renderCancelledEvents(cancelledEvents)
      renderHistory(historyRows)
    }

    async function renderDashboardEvents(events, myResByEvent, slotsByEvent, waitlistByEvent) {
      const container = document.getElementById('events-dashboard-list')
      if (!events.length) {
        container.innerHTML = `<p class="muted" style="font-style:italic">${t('暂无活动', 'No upcoming events')}</p>`
        return
      }

      container.innerHTML = ''

      for (const ev of events) {
        const myRes = myResByEvent[ev.id] || null
        const used = slotsByEvent[ev.id] || 0
        const isCurated = ev.event_type === 'curated'

        // Guest list section (if any show_* flag is set)
        let guestListHtml = ''
        if (ev.show_count || ev.show_names || ev.show_gender) {
          const gl = await loadEventGuestList(ev.id, ev.show_count, ev.show_names, ev.show_gender)
          if (gl) {
            let inner = ''
            if (ev.show_count && gl.count !== null) {
              const countLabel = `${gl.count} ${t('位确认', 'confirmed')}`
              inner += `<span class="event-guest-label">${t('出席', "WHO'S COMING")} · ${escapeHtml(countLabel)}</span>`
            }
            if ((ev.show_names || ev.show_gender) && gl.guests.length) {
              const pills = gl.guests.map(g => {
                const name = escapeHtml(g.name || 'Guest ◆')
                const gBadge = ev.show_gender ? ` ${renderGenderBadge(g.gender)}` : ''
                const mBadge = ev.show_gender && g.mbti ? ` <span class="g-badge g-mbti">${escapeHtml(g.mbti)}</span>` : ''
                const plus = g.guestCount === 2 ? ` <span class="badge" style="font-size:0.44rem">+1</span>` : ''
                return `<span class="guest-pill">${name}${gBadge}${mBadge}${plus}</span>`
              }).join('')
              inner += `<div class="guest-pills">${pills}</div>`
            }
            if (inner) guestListHtml = `<div class="event-guest-list">${inner}</div>`
          }
        }

        const row = document.createElement('div')
        row.className = 'event-row'
        row.dataset.eventId = ev.id
        row.dataset.eventType = ev.event_type
        row.dataset.capacity = ev.capacity - (ev.admin_reserved || 0)
        row.dataset.used = used

        row.innerHTML = buildEventRowHtml(ev, myRes, used, isCurated, guestListHtml, waitlistByEvent)
        container.appendChild(row)
      }

      // Attach all interaction handlers
      attachEventRowHandlers(container)
    }

    function buildEventRowHtml(ev, myRes, used, isCurated, guestListHtml, waitlistByEvent) {
      const timeRange = formatTimeRange(ev.start_time, ev.end_time)
      const dateStr = escapeHtml(formatEventDate(ev.event_date)) + (timeRange ? ' · ' + timeRange : '')
      const titleStr = escapeHtml(ev.title)
      const curatedBadge = isCurated
        ? ` <span class="badge badge-curated" style="font-size:0.46rem;vertical-align:middle">${t('策划', 'Curated')}</span>`
        : ''

      // Status / action (right side of header)
      let statusHtml = ''
      let metaHtml = ''

      if (!myRes) {
        // No reservation yet
        if (isCurated) {
          statusHtml = `<button class="btn btn-sm interest-btn" data-event-id="${ev.id}" style="border-color:#B89CD8;color:#B89CD8">${t('表达意愿 →', 'Express Interest →')}</button>`
        } else {
          const isFull = used >= (ev.capacity - (ev.admin_reserved || 0))
          if (isFull) {
            statusHtml = `<button class="btn btn-sm reserve-btn" data-event-id="${ev.id}">${t('加入等候 →', 'Join Waitlist →')}</button>`
          } else {
            statusHtml = `<button class="btn btn-sm reserve-btn" data-event-id="${ev.id}">${t('预订 →', 'Reserve →')}</button>`
          }
        }
        if (!isCurated) {
          metaHtml = `<div class="event-meta" style="margin-top:0.45rem">${renderSlotMeter(used, ev.capacity - (ev.admin_reserved || 0))}</div>`
        }
      } else if (myRes.status === 'confirmed') {
        const guestNote = myRes.guest_count === 2
          ? `<div style="font-style:italic;color:var(--muted);font-size:0.78rem;margin-top:0.1rem">${t('本人 + 1位宾客', 'Me + 1 guest')}</div>`
          : ''
        statusHtml = `<div style="text-align:right;flex-shrink:0"><div class="res-confirmed">✓ ${t('已确认', 'Confirmed')}</div>${guestNote}</div>`
        const cancelBtn = myRes.admin_added
          ? ''
          : `<button class="btn btn-danger btn-sm cancel-btn" data-res-id="${myRes.id}">${t('取消', 'Cancel')}</button>`
        const slotMeter = isCurated ? '' : renderSlotMeter(used, ev.capacity - (ev.admin_reserved || 0))
        const noteHtml = myRes.message ? `<div class="event-note">${t('备注', 'Your note')}: <span>${escapeHtml(myRes.message)}</span></div>` : ''
        metaHtml = `<div class="event-meta" style="margin-top:0.45rem">${slotMeter}${cancelBtn}</div>${noteHtml}`
      } else if (myRes.status === 'waitlisted') {
        const waitQueue = waitlistByEvent[ev.id] || []
        const waitPos = waitQueue.findIndex(r => r.id === myRes.id) + 1
        const posLabel = waitPos > 0 ? ` #${waitPos}` : ''
        statusHtml = `<div style="text-align:right;flex-shrink:0"><div class="res-waitlisted">⏳ ${t('等候中', 'Waitlist')}${posLabel}</div></div>`
        const cancelBtn = `<button class="btn btn-danger btn-sm cancel-btn" data-res-id="${myRes.id}">${t('退出等候', 'Leave Waitlist')}</button>`
        metaHtml = `<div class="event-meta" style="margin-top:0.45rem">${renderSlotMeter(used, ev.capacity - (ev.admin_reserved || 0))}${cancelBtn}</div>`
      } else if (myRes.status === 'interested') {
        statusHtml = `<div style="text-align:right;flex-shrink:0"><div class="res-interested">✦ ${t('已提交意愿', 'Interest Submitted')}</div><div style="font-style:italic;color:var(--muted);font-size:0.78rem;margin-top:0.1rem">${t('等待主持人确认', 'Awaiting host selection')}</div></div>`
        const cancelBtn = `<button class="btn btn-danger btn-sm cancel-btn" data-res-id="${myRes.id}">${t('撤回', 'Withdraw')}</button>`
        const noteHtml = myRes.message ? `<div class="event-note">${t('备注', 'Your note')}: <span>${escapeHtml(myRes.message)}</span></div>` : ''
        metaHtml = `<div class="event-meta" style="margin-top:0.45rem">${cancelBtn}</div>${noteHtml}`
      }

      return `
        <div class="event-row-header">
          <div>
            <div class="event-date">${dateStr}</div>
            <div class="event-title-text">${titleStr}${curatedBadge}</div>
          </div>
          ${statusHtml}
        </div>
        ${metaHtml}
        ${guestListHtml}
        <div class="inline-form" id="form-${ev.id}">
          ${buildReserveFormHtml(ev, used)}
        </div>
      `
    }

    function buildReserveFormHtml(ev, used) {
      const isCurated = ev.event_type === 'curated'
      const available = ev.capacity - (ev.admin_reserved || 0) - used
      const guestToggle = isCurated ? '' : `
        <span class="form-sublabel">${t('出席人数', 'GUESTS ATTENDING')}</span>
        <div class="guest-toggle">
          <button class="guest-opt active" data-count="1">${t('仅本人', 'Just me')}</button>
          ${available >= 2 ? `<button class="guest-opt" data-count="2">${t('本人 + 1位宾客', 'Me + 1 guest')}</button>` : ''}
          <span class="muted" style="font-style:italic;font-size:0.8rem">${available} ${t('位可用', 'seats available')}</span>
        </div>
      `
      const hint = isCurated
        ? `<p class="form-hint">${t('主持人将审核所有意愿并确认出席名单。', 'The host will review expressions of interest and confirm attendees.')}</p>`
        : ''
      const msgLabel = `<span class="form-sublabel">${t('备注', 'NOTE')} <span style="font-style:italic;font-family:'Cormorant Garamond',serif;letter-spacing:0;text-transform:none;font-size:0.9rem;color:var(--muted)"> — ${t('可选', 'optional')}</span></span>`
      const ctaText = isCurated ? t('提交意愿', 'Submit Interest') : t('确认预订', 'Confirm Reservation')
      // Curated CTA gets a purple inline style; open CTA gets btn-solid class
      const ctaExtraAttr = isCurated ? 'style="background:rgba(184,156,216,0.1);border-color:#B89CD8;color:#B89CD8"' : ''
      const ctaExtraClass = isCurated ? '' : ' btn-solid'

      return `
        ${guestToggle}
        ${msgLabel}
        <textarea class="event-message" placeholder="${t('给主持人留言（可选）', 'Leave a note for the host (optional)')}"></textarea>
        ${hint}
        <div style="display:flex;gap:0.5rem">
          <button ${ctaExtraAttr} class="btn${ctaExtraClass} btn-sm submit-res-btn" data-event-id="${ev.id}" data-event-type="${ev.event_type}">${ctaText}</button>
          <button class="btn btn-ghost btn-sm cancel-form-btn" data-event-id="${ev.id}">${t('取消', 'Cancel')}</button>
        </div>
        <span class="error res-error" style="display:none"></span>
      `
    }

    function attachEventRowHandlers(container) {
      // Show inline reservation/interest form
      container.querySelectorAll('.reserve-btn, .interest-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const eventId = btn.dataset.eventId
          document.getElementById('form-' + eventId).style.display = 'block'
          btn.style.display = 'none'
        })
      })

      // Hide form
      container.querySelectorAll('.cancel-form-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const eventId = btn.dataset.eventId
          document.getElementById('form-' + eventId).style.display = 'none'
          const row = btn.closest('.event-row')
          const showBtn = row.querySelector('.reserve-btn, .interest-btn')
          if (showBtn) showBtn.style.display = ''
        })
      })

      // Guest count toggle (open events)
      container.querySelectorAll('.guest-toggle').forEach(toggle => {
        toggle.querySelectorAll('.guest-opt').forEach(opt => {
          opt.addEventListener('click', () => {
            toggle.querySelectorAll('.guest-opt').forEach(o => o.classList.remove('active'))
            opt.classList.add('active')
          })
        })
      })

      // Submit reservation / interest
      container.querySelectorAll('.submit-res-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const eventId = btn.dataset.eventId
          const eventType = btn.dataset.eventType
          const form = document.getElementById('form-' + eventId)
          const message = form.querySelector('textarea.event-message').value.trim()
          const errEl = form.querySelector('.res-error')
          errEl.style.display = 'none'
          btn.disabled = true

          let guestCount = 1
          let status = 'interested'

          if (eventType === 'open') {
            const activeOpt = form.querySelector('.guest-opt.active')
            guestCount = activeOpt ? parseInt(activeOpt.dataset.count) : 1

            // Determine status: confirmed or waitlisted
            const row = btn.closest('.event-row')
            const used = parseInt(row.dataset.used) || 0
            const capacity = parseInt(row.dataset.capacity) || 6
            status = (used + guestCount <= capacity) ? 'confirmed' : 'waitlisted'
          }

          // Check if this attendee has a previously-removed or declined reservation for this event
          const reusableRes = attendeeReservations.find(
            r => r.event_id === eventId && (r.status === 'removed' || r.status === 'declined')
          )

          const { error } = reusableRes
            ? await reapplyReservation(reusableRes.id, guestCount, message || null, status)
            : await createReservation(eventId, currentAttendee.id, guestCount, message || null, status)

          btn.disabled = false
          if (error) {
            errEl.textContent = t('操作失败，请重试', 'Something went wrong. Please try again.')
            errEl.style.display = 'block'
            return
          }

          // Reload dashboard to reflect new reservation
          await loadDashboardData()
        })
      })

      // Cancel / withdraw
      container.querySelectorAll('.cancel-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          btn.disabled = true
          const { error } = await cancelReservation(btn.dataset.resId)
          btn.disabled = false
          if (!error) await loadDashboardData()
        })
      })
    }

    function renderCancelledEvents(reservations) {
      let container = document.getElementById('events-cancelled-list')
      if (!container) {
        const card = document.getElementById('events-dashboard-card')
        const wrapper = document.createElement('div')
        wrapper.id = 'events-cancelled-wrapper'
        wrapper.style.marginTop = '1.5rem'
        wrapper.innerHTML = `
          <div style="font-family:'Cinzel',serif;font-size:0.52rem;letter-spacing:0.14em;color:var(--muted);margin-bottom:0.75rem">CANCELLED</div>
          <div id="events-cancelled-list"></div>
        `
        card.appendChild(wrapper)
        container = document.getElementById('events-cancelled-list')
      }

      const wrapper = document.getElementById('events-cancelled-wrapper')

      if (!reservations.length) {
        if (wrapper) wrapper.style.display = 'none'
        return
      }

      wrapper.style.display = 'block'
      container.innerHTML = ''

      reservations.forEach(r => {
        const ev = r.events
        const timeRange = formatTimeRange(ev.start_time, ev.end_time)
        const dateStr = escapeHtml(formatEventDate(ev.event_date)) + (timeRange ? ' · ' + timeRange : '')
        const isCurated = ev.event_type === 'curated'
        const typeBadge = isCurated
          ? ` <span class="badge badge-curated" style="font-size:0.46rem;vertical-align:middle">${t('策划', 'Home Bar')}</span>`
          : ''

        const row = document.createElement('div')
        row.className = 'event-row'
        row.innerHTML = `
          <div class="event-row-header">
            <div>
              <div class="event-date">${dateStr}</div>
              <div class="event-title-text">${escapeHtml(ev.title)}${typeBadge}</div>
            </div>
            <span class="badge badge-red" style="font-size:0.5rem;align-self:flex-start">${t('已取消', 'Cancelled')}</span>
          </div>
        `
        container.appendChild(row)
      })
    }

    function renderInvitations(reservations) {
      let card = document.getElementById('invitations-card')

      if (!reservations.length) {
        if (card) card.style.display = 'none'
        return
      }

      if (!card) {
        card = document.createElement('div')
        card.id = 'invitations-card'
        card.className = 'card fade-in-2'
        const evCard = document.getElementById('events-dashboard-card')
        evCard.parentNode.insertBefore(card, evCard)
      }

      card.style.display = 'block'
      card.innerHTML = `
        <span class="eyebrow" data-zh="邀请" data-en="Invitations">邀请</span>
        <h2 style="margin-bottom:1.25rem" data-zh="您的邀请" data-en="Your Invitations">您的邀请</h2>
        <div id="invitations-list"></div>
      `

      const list = document.getElementById('invitations-list')

      reservations.forEach(r => {
        const ev = r.events
        const timeRange = formatTimeRange(ev.start_time, ev.end_time)
        const dateStr = escapeHtml(formatEventDate(ev.event_date)) + (timeRange ? ' · ' + timeRange : '')
        const isCurated = ev.event_type === 'curated'
        const typeBadge = isCurated
          ? ` <span class="badge badge-curated" style="font-size:0.46rem;vertical-align:middle">${t('策划', 'Home Bar')}</span>`
          : ''

        const row = document.createElement('div')
        row.className = 'event-row'
        row.innerHTML = `
          <div class="event-row-header">
            <div>
              <div class="event-date">${dateStr}</div>
              <div class="event-title-text">${escapeHtml(ev.title)}${typeBadge}</div>
            </div>
            <div style="display:flex;gap:0.4rem;flex-shrink:0">
              <button class="btn btn-sm btn-solid invite-accept-btn"
                data-res-id="${escapeHtml(r.id)}">${t('接受', 'Accept')}</button>
              <button class="btn btn-sm btn-danger invite-decline-btn"
                data-res-id="${escapeHtml(r.id)}"
                data-event-id="${escapeHtml(ev.id)}"
                data-admin-reserved="${ev.admin_reserved || 0}">${t('拒绝', 'Decline')}</button>
            </div>
          </div>
        `
        list.appendChild(row)
      })

      list.querySelectorAll('.invite-accept-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          btn.disabled = true
          const { error } = await acceptInvite(btn.dataset.resId)
          if (error) { btn.disabled = false; return }
          await loadDashboardData()
        })
      })

      list.querySelectorAll('.invite-decline-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          btn.disabled = true
          const { error } = await declineInvite(
            btn.dataset.resId,
            btn.dataset.eventId,
            parseInt(btn.dataset.adminReserved) || 0
          )
          if (error) { btn.disabled = false; return }
          await loadDashboardData()
        })
      })
    }

    function renderHistory(rows) {
      const container = document.getElementById('history-list')
      if (!rows.length) {
        container.innerHTML = `<p class="muted" style="font-style:italic">${t('暂无出席记录', 'No attendance history yet')}</p>`
        return
      }
      container.innerHTML = ''
      rows.forEach(r => {
        const ev = r.events
        const statusMap = {
          confirmed: { label: t('已出席', 'Attended'), cls: 'badge-green' },
          removed:   { label: t('缺席', 'No-show'),   cls: 'badge-red'   },
          declined:  { label: t('未入选', 'Not Selected'), cls: 'badge-muted' }
        }
        const { label, cls } = statusMap[r.status] || { label: escapeHtml(r.status), cls: 'badge-muted' }
        const curatedBadge = ev.event_type === 'curated'
          ? ` <span class="badge badge-curated" style="font-size:0.42rem;vertical-align:middle">Curated</span>`
          : ''
        const row = document.createElement('div')
        row.className = 'history-row'
        row.innerHTML = `
          <div>
            <div class="history-date">${escapeHtml(formatEventDate(ev.event_date))}</div>
            <div style="color:var(--cream)">${escapeHtml(ev.title)}${curatedBadge}</div>
          </div>
          <span class="badge ${cls}">${label}</span>
        `
        container.appendChild(row)
      })
    }

    // Auth tabs
    document.querySelectorAll('.auth-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'))
        document.querySelectorAll('.auth-panel').forEach(p => p.classList.remove('active'))
        tab.classList.add('active')
        document.getElementById('panel-' + tab.dataset.panel).classList.add('active')
      })
    })

    // Restore session
    let currentAttendee = null
    let attendeeReservations = []
    const session = getAttendeeSession()
    if (session) showDashboard(session)

    // Login
    document.getElementById('login-btn').addEventListener('click', async () => {
      const username = document.getElementById('username').value.trim().toLowerCase()
      const pin = document.getElementById('pin').value
      if (!username) return

      // Check for blank pin (first-time setup via admin-added account)
      const { data: existing } = await supabase
        .from('attendees').select('pin_hash').eq('username', username).single()
      if (existing && existing.pin_hash === '') {
        const errEl = document.getElementById('login-error')
        errEl.textContent = t('首次登录？请通过「加入Open Bar」标签设置密码。', 'First time? Please set your PIN via the "Join Open Bar" tab.')
        errEl.style.display = 'block'
        return
      }

      if (!pin) return
      const attendee = await loginAttendee(username, pin)
      if (attendee?.error === 'disabled') {
        const errEl = document.getElementById('login-error')
        errEl.textContent = t('账户已被禁用，请联系主人', 'Account disabled. Please contact the host.')
        errEl.style.display = 'block'
      } else if (attendee) {
        showDashboard(attendee)
      } else {
        const errEl = document.getElementById('login-error')
        errEl.textContent = t('用户名或密码错误', 'Incorrect username or PIN')
        errEl.style.display = 'block'
      }
    })

    // Self-signup
    document.getElementById('signup-btn').addEventListener('click', async () => {
      const username = document.getElementById('signup-username').value.trim().toLowerCase()
      const pin = document.getElementById('signup-pin').value
      const confirm = document.getElementById('signup-pin-confirm').value
      const status = document.getElementById('signup-status')

      if (!username) { status.textContent = t('请选择用户名', 'Please choose a username'); status.className = 'error'; return }
      if (!/^\d{4}$/.test(pin)) { status.textContent = t('密码须为4位数字', 'PIN must be exactly 4 digits'); status.className = 'error'; return }
      if (pin !== confirm) { status.textContent = t('两次密码不一致', 'PINs do not match'); status.className = 'error'; return }

      const gender = document.getElementById('signup-gender').value || null
      const mbti   = document.getElementById('signup-mbti').value || null
      const pin_hash = await hashPin(pin)
      const { error } = await supabase
        .from('attendees')
        .insert({
          username,
          pin_hash,
          credits: 0,
          alias: null,
          gender,
          mbti,
          gender_visibility: gender ? 'public' : 'admin_only'
        })

      if (error) {
        status.textContent = error.code === '23505'
          ? t('该用户名已被占用', 'Username already taken')
          : t('注册失败，请重试', 'Signup failed, please try again')
        status.className = 'error'
        return
      }

      status.textContent = t('账户创建成功！正在登录…', 'Account created! Signing in…')
      status.className = 'success'

      const attendee = await loginAttendee(username, pin)
      if (attendee && !attendee.error) showDashboard(attendee)
    })

    // Logout
    document.getElementById('logout-btn').addEventListener('click', () => {
      logoutAttendee()
      currentAttendee = null
      document.getElementById('dashboard-section').style.display = 'none'
      document.getElementById('auth-section').style.display = 'block'
      document.getElementById('pin').value = ''
    })

    async function showDashboard(attendee) {
      currentAttendee = attendee
      loadDashboardData()
      document.getElementById('auth-section').style.display = 'none'
      document.getElementById('dashboard-section').style.display = 'block'
      document.getElementById('greeting').textContent = attendee.alias || attendee.username

      // Wishlist
      const wishlist = await loadWishlist()
      const wishlistEl = document.getElementById('wishlist-list')
      if (wishlist.length === 0) {
        wishlistEl.innerHTML = `<p class="muted" style="font-style:italic">${t('暂无愿望单', 'No items on the wishlist')}</p>`
      } else {
        wishlist.forEach(w => {
          const row = document.createElement('div')
          row.className = 'wishlist-row'
          row.innerHTML = `<span class="wishlist-name">${escapeHtml(w.item_name)}</span>`
          wishlistEl.appendChild(row)
        })
      }

      // apply lang to newly rendered static data-zh/en elements
      const { applyLang } = await import('./js/i18n.js')
      applyLang()
    }

    // ── Gender pills ──────────────────────────────────────────────────────────
    function signupSelectGender(el) {
      document.querySelectorAll('.gender-pill').forEach(b => b.classList.remove('active'))
      el.classList.add('active')
      document.getElementById('signup-gender').value = el.dataset.value
    }
    window.signupSelectGender = signupSelectGender

    // ── MBTI carousel ─────────────────────────────────────────────────────────
    let mbtiCur = 0
    const mbtiColors = ['#7AA0D8','#A888D0','#5A9068','#C9A84C']

    function mbtiGoSlide(idx, tabEl) {
      mbtiCur = idx
      const track = document.getElementById('mbti-track')
      const wrap  = document.getElementById('mbti-carousel')
      if (track) track.style.transform = `translateX(${-idx * 100}%)`
      if (wrap)  wrap.style.setProperty('--mbti-gr', mbtiColors[idx])
      document.querySelectorAll('.mbti-signup-tab').forEach((t,i) => t.classList.toggle('active', i === idx))
      document.querySelectorAll('.mbti-nav-dot').forEach((d,i) => d.classList.toggle('active', i === idx))
    }

    function mbtiPick(el, type) {
      document.querySelectorAll('.mbti-char-card').forEach(c => c.classList.remove('sel'))
      el.classList.add('sel')
      document.getElementById('signup-mbti').value = type
    }

    function mbtiPrev() { mbtiGoSlide((mbtiCur + 3) % 4) }
    function mbtiNext() { mbtiGoSlide((mbtiCur + 1) % 4) }

    window.mbtiGoSlide = mbtiGoSlide
    window.mbtiPick    = mbtiPick
    window.mbtiPrev    = mbtiPrev
    window.mbtiNext    = mbtiNext

    // Swipe/drag on carousel
    ;(function() {
      let startX = 0, dragging = false
      document.addEventListener('pointerdown', e => {
        if (!e.target.closest('.mbti-carousel-wrap')) return
        startX = e.clientX
        dragging = true
      })
      document.addEventListener('pointermove', e => {
        if (!dragging) return
        e.preventDefault()
      }, { passive: false })
      document.addEventListener('pointerup', e => {
        if (!dragging) return
        dragging = false
        const dx = e.clientX - startX
        if (Math.abs(dx) > 40) dx < 0 ? mbtiNext() : mbtiPrev()
      })
    })()

    // ── Profile panel: MBTI carousel ──────────────────────────────────────────
    let profileMbtiCur = 0
    const profileMbtiColors = ['122,160,216','168,136,208','90,144,104','201,168,76']

    function profileMbtiGoSlide(idx) {
      profileMbtiCur = idx
      const track = document.getElementById('profile-mbti-track')
      const wrap  = document.getElementById('profile-mbti-carousel')
      if (track) track.style.transform = `translateX(${-idx * 100}%)`
      if (wrap)  wrap.style.setProperty('--mbti-gr', profileMbtiColors[idx])
      document.querySelectorAll('#profile-mbti-tabs .mbti-signup-tab').forEach((t,i) => t.classList.toggle('active', i === idx))
      document.querySelectorAll('#profile-mbti-dots .mbti-nav-dot').forEach((d,i) => d.classList.toggle('active', i === idx))
      const prev = document.getElementById('profile-mbti-prev')
      const next = document.getElementById('profile-mbti-next')
      if (prev) prev.disabled = idx === 0
      if (next) next.disabled = idx === 3
    }

    function profileMbtiPick(el, type) {
      document.querySelectorAll('.profile-char-card').forEach(c => c.classList.remove('sel'))
      el.classList.add('sel')
      document.getElementById('profile-mbti-val').value = type
    }

    function profileMbtiPrev() { if (profileMbtiCur > 0) profileMbtiGoSlide(profileMbtiCur - 1) }
    function profileMbtiNext() { if (profileMbtiCur < 3) profileMbtiGoSlide(profileMbtiCur + 1) }

    window.profileMbtiGoSlide = profileMbtiGoSlide
    window.profileMbtiPick    = profileMbtiPick
    window.profileMbtiPrev    = profileMbtiPrev
    window.profileMbtiNext    = profileMbtiNext
  </script>
</body>
</html>
