<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open Bar — 二十五</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-container { max-width: 460px; margin: 0 auto; }
    .auth-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }
    .auth-tab {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 0.7rem 1.25rem;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      margin-bottom: -1px;
    }
    .auth-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
    .auth-panel { display: none; }
    .auth-panel.active { display: block; animation: fadeUp 0.3s ease both; }

    .dashboard { max-width: 720px; margin: 0 auto; }
    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 1rem;
    }
    .dashboard-name { font-size: clamp(1.5rem, 4vw, 2.2rem); color: var(--cream); margin-bottom: 0.3rem; }
    .wishlist-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.65rem 0;
      border-bottom: 1px solid rgba(201,168,76,0.08);
    }
    .wishlist-row:last-child { border: none; }
    .wishlist-name { color: var(--text); }
  </style>
</head>
<body>
  <div id="nav"></div>
  <main>
    <!-- AUTH SECTION (login or signup) -->
    <div id="auth-section">
      <div class="page-header fade-in">
        <span class="eyebrow" data-zh="Open Bar" data-en="Open Bar">Open Bar</span>
        <h1>Open Bar</h1>
        <p data-zh="查看愿望单，登录账户" data-en="Browse the wishlist and sign in to your account">查看愿望单，登录账户</p>
      </div>

      <div class="auth-container fade-in-2">
        <div class="auth-tabs">
          <button class="auth-tab active" data-panel="login" data-zh="登录" data-en="Sign In">登录</button>
          <button class="auth-tab" data-panel="signup" data-zh="加入Open Bar" data-en="Join Open Bar">加入Open Bar</button>
        </div>

        <!-- LOGIN -->
        <div class="auth-panel active" id="panel-login">
          <div class="card">
            <input type="text" id="username"
              data-placeholder-zh="用户名" data-placeholder-en="Username"
              placeholder="用户名" autocomplete="username">
            <input type="password" id="pin"
              data-placeholder-zh="密码" data-placeholder-en="Password"
              placeholder="密码" autocomplete="current-password">
            <button class="btn btn-solid" id="login-btn" style="width:100%" data-zh="登录" data-en="Sign In">登录</button>
            <span id="login-error" class="error" style="display:none"></span>
          </div>
        </div>

        <!-- SIGNUP -->
        <div class="auth-panel" id="panel-signup">
          <div class="card">
            <p style="font-style:italic;color:var(--muted);margin-bottom:1.25rem;font-size:0.95rem"
              data-zh="创建账户以查看愿望单。"
              data-en="Create an account to browse the wishlist.">
              创建账户以查看愿望单。
            </p>
            <input type="text" id="signup-username"
              data-placeholder-zh="选择用户名" data-placeholder-en="Choose a username"
              placeholder="选择用户名" autocomplete="username">
            <input type="password" id="signup-pin"
              data-placeholder-zh="设置密码（至少4位）" data-placeholder-en="Set password (min 4 chars)"
              placeholder="设置密码（至少4位）" autocomplete="new-password">
            <input type="password" id="signup-pin-confirm"
              data-placeholder-zh="确认密码" data-placeholder-en="Confirm password"
              placeholder="确认密码" autocomplete="new-password">
            <button class="btn btn-solid" id="signup-btn" style="width:100%" data-zh="创建账户" data-en="Create Account">创建账户</button>
            <span id="signup-status"></span>
          </div>
        </div>
      </div>
    </div>

    <!-- DASHBOARD (shown after login) -->
    <div id="dashboard-section" style="display:none">
      <div class="dashboard">
        <div class="dashboard-header fade-in">
          <div>
            <span class="eyebrow" data-zh="欢迎回来" data-en="Welcome Back">欢迎回来</span>
            <h1 class="dashboard-name" id="greeting"></h1>
          </div>
          <button class="btn btn-sm" id="logout-btn" data-zh="退出" data-en="Sign Out">退出</button>
        </div>

        <div class="rule"><span>◆</span></div>

        <div class="card fade-in-2">
          <span class="eyebrow" data-zh="带什么来" data-en="What to Bring">带什么来</span>
          <h2 style="margin-bottom:1rem" data-zh="愿望单" data-en="Wishlist">愿望单</h2>
          <div id="wishlist-list"></div>
        </div>

      </div>
    </div>
  </main>
  <div id="footer"></div>
  <script type="module">
    import { requirePasscode, loginAttendee, getAttendeeSession, logoutAttendee, hashPin } from './js/auth.js'
    import { renderNav, renderFooter, initLang } from './js/nav.js'
    import { loadWishlist } from './js/openbar.js'
    import { supabase } from './js/supabase-client.js'
    import { t } from './js/i18n.js'

    requirePasscode()
    document.getElementById('nav').innerHTML = renderNav('Open Bar')
    document.getElementById('footer').innerHTML = renderFooter()
    initLang()

    function escapeHtml(str) {
      if (!str) return ''
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')
    }

    // Auth tabs
    document.querySelectorAll('.auth-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'))
        document.querySelectorAll('.auth-panel').forEach(p => p.classList.remove('active'))
        tab.classList.add('active')
        document.getElementById('panel-' + tab.dataset.panel).classList.add('active')
      })
    })

    // Restore session
    let currentAttendee = null
    const session = getAttendeeSession()
    if (session) showDashboard(session)

    // Login
    document.getElementById('login-btn').addEventListener('click', async () => {
      const username = document.getElementById('username').value.trim().toLowerCase()
      const pin = document.getElementById('pin').value
      if (!username) return

      // Check for blank pin (first-time setup via admin-added account)
      const { data: existing } = await supabase
        .from('attendees').select('pin_hash').eq('username', username).single()
      if (existing && existing.pin_hash === '') {
        const errEl = document.getElementById('login-error')
        errEl.textContent = t('首次登录？请通过「加入Open Bar」标签设置密码。', 'First time? Please set your password via the "Join Open Bar" tab.')
        errEl.style.display = 'block'
        return
      }

      if (!pin) return
      const attendee = await loginAttendee(username, pin)
      if (attendee) { showDashboard(attendee) }
      else {
        const errEl = document.getElementById('login-error')
        errEl.textContent = t('用户名或密码错误', 'Incorrect username or password')
        errEl.style.display = 'block'
      }
    })

    // Self-signup
    document.getElementById('signup-btn').addEventListener('click', async () => {
      const username = document.getElementById('signup-username').value.trim().toLowerCase()
      const pin = document.getElementById('signup-pin').value
      const confirm = document.getElementById('signup-pin-confirm').value
      const status = document.getElementById('signup-status')

      if (!username) { status.textContent = t('请选择用户名', 'Please choose a username'); status.className = 'error'; return }
      if (pin.length < 4) { status.textContent = t('密码至少4位', 'Password must be at least 4 characters'); status.className = 'error'; return }
      if (pin !== confirm) { status.textContent = t('两次密码不一致', 'Passwords do not match'); status.className = 'error'; return }

      const pin_hash = await hashPin(pin)
      const { error } = await supabase
        .from('attendees')
        .insert({ username, pin_hash, credits: 0, alias: null })

      if (error) {
        status.textContent = error.code === '23505'
          ? t('该用户名已被占用', 'Username already taken')
          : t('注册失败，请重试', 'Signup failed, please try again')
        status.className = 'error'
        return
      }

      status.textContent = t('账户创建成功！正在登录…', 'Account created! Signing in…')
      status.className = 'success'

      const attendee = await loginAttendee(username, pin)
      if (attendee) showDashboard(attendee)
    })

    // Logout
    document.getElementById('logout-btn').addEventListener('click', () => {
      logoutAttendee()
      currentAttendee = null
      document.getElementById('dashboard-section').style.display = 'none'
      document.getElementById('auth-section').style.display = 'block'
      document.getElementById('pin').value = ''
    })

    async function showDashboard(attendee) {
      currentAttendee = attendee
      document.getElementById('auth-section').style.display = 'none'
      document.getElementById('dashboard-section').style.display = 'block'
      document.getElementById('greeting').textContent = attendee.alias || attendee.username

      // Wishlist
      const wishlist = await loadWishlist()
      const wishlistEl = document.getElementById('wishlist-list')
      if (wishlist.length === 0) {
        wishlistEl.innerHTML = `<p class="muted" style="font-style:italic">${t('暂无愿望单', 'No items on the wishlist')}</p>`
      } else {
        wishlist.forEach(w => {
          const row = document.createElement('div')
          row.className = 'wishlist-row'
          row.innerHTML = `<span class="wishlist-name">${escapeHtml(w.item_name)}</span>`
          wishlistEl.appendChild(row)
        })
      }

      // apply lang to newly rendered static data-zh/en elements
      const { applyLang } = await import('./js/i18n.js')
      applyLang()
    }
  </script>
</body>
</html>
