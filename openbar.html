<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open Bar — 二十五</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-container { max-width: 460px; margin: 0 auto; }
    .auth-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }
    .auth-tab {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 0.7rem 1.25rem;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      margin-bottom: -1px;
    }
    .auth-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
    .auth-panel { display: none; }
    .auth-panel.active { display: block; animation: fadeUp 0.3s ease both; }

    .dashboard { max-width: 720px; margin: 0 auto; }
    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 1rem;
    }
    .dashboard-name { font-size: clamp(1.5rem, 4vw, 2.2rem); color: var(--cream); margin-bottom: 0.3rem; }
    .wishlist-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.65rem 0;
      border-bottom: 1px solid rgba(201,168,76,0.08);
    }
    .wishlist-row:last-child { border: none; }
    .wishlist-name { color: var(--text); }
    .order-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.6rem 0;
      border-bottom: 1px solid rgba(201,168,76,0.08);
      font-size: 0.95rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .order-row:last-child { border: none; }
    select {
      width: 100%;
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(201,168,76,0.14);
      border-radius: 2px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      margin-bottom: 0.85rem;
      outline: none;
    }
    select:focus { border-color: var(--gold-dim, rgba(201,168,76,0.35)); }
  </style>
</head>
<body>
  <div id="nav"></div>
  <main>
    <!-- AUTH SECTION (login or signup) -->
    <div id="auth-section">
      <div class="page-header fade-in">
        <span class="eyebrow">积分系统</span>
        <h1>Open Bar</h1>
        <p>带瓶酒，赚积分，点饮品</p>
      </div>

      <div class="auth-container fade-in-2">
        <div class="auth-tabs">
          <button class="auth-tab active" data-panel="login">登录</button>
          <button class="auth-tab" data-panel="signup">加入Open Bar</button>
        </div>

        <!-- LOGIN -->
        <div class="auth-panel active" id="panel-login">
          <div class="card">
            <input type="text" id="username" placeholder="用户名" autocomplete="username">
            <input type="password" id="pin" placeholder="密码" autocomplete="current-password">
            <button class="btn btn-solid" id="login-btn" style="width:100%">登录</button>
            <span id="login-error" class="error" style="display:none">用户名或密码错误</span>
          </div>
        </div>

        <!-- SIGNUP -->
        <div class="auth-panel" id="panel-signup">
          <div class="card">
            <p style="font-style:italic;color:var(--muted);margin-bottom:1.25rem;font-size:0.95rem">
              创建您的Open Bar账户。带一瓶愿望单上的酒来赚取积分。
            </p>
            <input type="text" id="signup-username" placeholder="选择用户名" autocomplete="username">
            <input type="password" id="signup-pin" placeholder="设置密码（至少4位）" autocomplete="new-password">
            <input type="password" id="signup-pin-confirm" placeholder="确认密码" autocomplete="new-password">
            <button class="btn btn-solid" id="signup-btn" style="width:100%">创建账户</button>
            <span id="signup-status"></span>
          </div>
        </div>
      </div>
    </div>

    <!-- DASHBOARD (shown after login) -->
    <div id="dashboard-section" style="display:none">
      <div class="dashboard">
        <div class="dashboard-header fade-in">
          <div>
            <span class="eyebrow">欢迎回来</span>
            <h1 class="dashboard-name" id="greeting"></h1>
            <span class="badge" id="credits-display">0 credits</span>
          </div>
          <button class="btn btn-sm" id="logout-btn">退出</button>
        </div>

        <div class="rule"><span>◆</span></div>

        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.25rem">
          <div class="card fade-in-2">
            <span class="eyebrow">带什么来</span>
            <h2 style="margin-bottom:1rem">愿望单</h2>
            <div id="wishlist-list"></div>
          </div>

          <div class="card fade-in-3">
            <span class="eyebrow">兑换积分</span>
            <h2 style="margin-bottom:1rem">点一杯</h2>
            <select id="order-drink"></select>
            <button class="btn btn-solid" id="order-btn" style="width:100%">下单</button>
            <span id="order-status"></span>
          </div>
        </div>

        <div class="card fade-in-4" style="margin-top:1.25rem">
          <span class="eyebrow">历史</span>
          <h2 style="margin-bottom:1rem">我的订单</h2>
          <div id="order-history"></div>
        </div>
      </div>
    </div>
  </main>
  <div id="footer"></div>
  <script type="module">
    import { requirePasscode, loginAttendee, getAttendeeSession, logoutAttendee, setPin, hashPin } from './js/auth.js'
    import { renderNav, renderFooter, initLang } from './js/nav.js'
    import { loadWishlist, loadAttendeeOrders, placeOrder, refreshAttendeeCredits } from './js/openbar.js'
    import { loadDrinks } from './js/menu.js'
    import { supabase } from './js/supabase-client.js'

    requirePasscode()
    document.getElementById('nav').innerHTML = renderNav('Open Bar')
    document.getElementById('footer').innerHTML = renderFooter()
    initLang()

    function escapeHtml(str) {
      if (!str) return ''
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')
    }

    // Auth tabs
    document.querySelectorAll('.auth-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'))
        document.querySelectorAll('.auth-panel').forEach(p => p.classList.remove('active'))
        tab.classList.add('active')
        document.getElementById('panel-' + tab.dataset.panel).classList.add('active')
      })
    })

    // Restore session
    let currentAttendee = null
    const session = getAttendeeSession()
    if (session) showDashboard(session)

    // Login
    document.getElementById('login-btn').addEventListener('click', async () => {
      const username = document.getElementById('username').value.trim().toLowerCase()
      const pin = document.getElementById('pin').value
      if (!username) return

      // Check for blank pin (first-time setup via admin-added account)
      const { data: existing } = await supabase
        .from('attendees').select('pin_hash').eq('username', username).single()
      if (existing && existing.pin_hash === '') {
        document.getElementById('login-error').style.display = 'none'
        // Prompt them to use signup tab or show inline message
        const errEl = document.getElementById('login-error')
        errEl.textContent = '首次登录？请通过「加入Open Bar」标签设置密码。'
        errEl.style.display = 'block'
        return
      }

      if (!pin) return
      const attendee = await loginAttendee(username, pin)
      if (attendee) { showDashboard(attendee) }
      else { document.getElementById('login-error').style.display = 'block' }
    })

    // Self-signup
    document.getElementById('signup-btn').addEventListener('click', async () => {
      const username = document.getElementById('signup-username').value.trim().toLowerCase()
      const pin = document.getElementById('signup-pin').value
      const confirm = document.getElementById('signup-pin-confirm').value
      const status = document.getElementById('signup-status')

      if (!username) { status.textContent = '请选择用户名'; status.className = 'error'; return }
      if (pin.length < 4) { status.textContent = '密码至少4位'; status.className = 'error'; return }
      if (pin !== confirm) { status.textContent = '两次密码不一致'; status.className = 'error'; return }

      const pin_hash = await hashPin(pin)
      const { error } = await supabase
        .from('attendees')
        .insert({ username, pin_hash, credits: 0, alias: null })

      if (error) {
        status.textContent = error.code === '23505' ? '该用户名已被占用' : '注册失败，请重试'
        status.className = 'error'
        return
      }

      status.textContent = '账户创建成功！正在登录…'
      status.className = 'success'

      const attendee = await loginAttendee(username, pin)
      if (attendee) showDashboard(attendee)
    })

    // Logout
    document.getElementById('logout-btn').addEventListener('click', () => {
      logoutAttendee()
      currentAttendee = null
      document.getElementById('dashboard-section').style.display = 'none'
      document.getElementById('auth-section').style.display = 'block'
      document.getElementById('pin').value = ''
    })

    // Order button
    document.getElementById('order-btn').addEventListener('click', async () => {
      if (!currentAttendee) return
      const drinkId = document.getElementById('order-drink').value
      const statusEl = document.getElementById('order-status')
      if (!drinkId) return
      const result = await placeOrder(currentAttendee.id, drinkId)
      if (result.ok) {
        statusEl.textContent = '订单已提交，等待审核'
        statusEl.className = 'success'
        const newCredits = await refreshAttendeeCredits(currentAttendee.id)
        if (newCredits !== null) document.getElementById('credits-display').textContent = `${newCredits} 积分`
      } else {
        statusEl.textContent = result.reason
        statusEl.className = 'error'
      }
    })

    async function showDashboard(attendee) {
      currentAttendee = attendee
      document.getElementById('auth-section').style.display = 'none'
      document.getElementById('dashboard-section').style.display = 'block'
      document.getElementById('greeting').textContent = attendee.alias || attendee.username
      document.getElementById('credits-display').textContent = `${attendee.credits} 积分`

      // Wishlist
      const wishlist = await loadWishlist()
      const wishlistEl = document.getElementById('wishlist-list')
      if (wishlist.length === 0) {
        wishlistEl.innerHTML = '<p class="muted" style="font-style:italic">暂无愿望单</p>'
      } else {
        wishlist.forEach(w => {
          const row = document.createElement('div')
          row.className = 'wishlist-row'
          row.innerHTML = `<span class="wishlist-name">${escapeHtml(w.item_name)}</span><span class="badge">${escapeHtml(String(w.credit_value))} 积分</span>`
          wishlistEl.appendChild(row)
        })
      }

      // Order drink select
      const drinks = await loadDrinks()
      const orderSelect = document.getElementById('order-drink')
      orderSelect.innerHTML = ''
      if (drinks.length === 0) {
        orderSelect.innerHTML = '<option disabled>暂无酒单</option>'
      } else {
        drinks.forEach(d => {
          const opt = document.createElement('option')
          opt.value = d.id
          opt.textContent = d.name
          orderSelect.appendChild(opt)
        })
      }

      // Order history
      const orders = await loadAttendeeOrders(attendee.id)
      const historyEl = document.getElementById('order-history')
      if (orders.length === 0) {
        historyEl.innerHTML = '<p class="muted" style="font-style:italic">暂无订单</p>'
      } else {
        orders.forEach(o => {
          const row = document.createElement('div')
          row.className = 'order-row'
          const statusLabel = { pending: '待处理', approved: '已批准', rejected: '已拒绝' }
          row.innerHTML = `
            <span>${escapeHtml(o.drinks?.name || 'Unknown')}</span>
            <span class="status-${escapeHtml(o.status)}">${statusLabel[o.status] || escapeHtml(o.status)}</span>
            <span class="muted">${new Date(o.created_at).toLocaleDateString()}</span>
          `
          historyEl.appendChild(row)
        })
      }
    }
  </script>
</body>
</html>
