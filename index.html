<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Homebar</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .gate {
      text-align: center;
      padding: 3rem 2rem;
      max-width: 400px;
      width: 100%;
      animation: fadeUp 0.8s cubic-bezier(0.16,1,0.3,1) both;
    }
    .gate-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 8vw, 4rem);
      color: var(--cream);
      letter-spacing: 0.04em;
      margin-bottom: 0.25rem;
    }
    .gate-subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      color: var(--muted);
      font-size: 1rem;
      margin-bottom: 2.5rem;
    }
    .gate input {
      text-align: center;
      letter-spacing: 0.3em;
      font-size: 1.1rem;
    }
    .gate .btn { width: 100%; margin-top: 0.25rem; }
    .gate-ornament {
      color: var(--gold-dim, rgba(201,168,76,0.35));
      font-size: 1.2rem;
      letter-spacing: 0.5rem;
      margin-bottom: 1.75rem;
      display: block;
    }
  </style>
</head>
<body>
  <div class="gate">
    <span class="eyebrow">Private — Members Only</span>
    <h1 class="gate-title">The Homebar</h1>
    <p class="gate-subtitle">Est. 2024</p>
    <span class="gate-ornament">◆ ◇ ◆</span>
    <form id="passcode-form">
      <input type="password" id="passcode" placeholder="Enter passcode" autocomplete="off" required>
      <button class="btn btn-solid" type="submit">Enter</button>
      <span id="error" class="error" style="display:none;margin-top:1rem">Incorrect passcode</span>
    </form>
  </div>
  <script type="module">
    import { isPasscodeVerified, verifyPasscode, setPasscodeVerified } from './js/auth.js'
    if (isPasscodeVerified()) window.location.href = '/home.html'
    document.getElementById('passcode-form').addEventListener('submit', async (e) => {
      e.preventDefault()
      const btn = e.submitter
      btn.disabled = true
      btn.textContent = '...'
      const ok = await verifyPasscode(document.getElementById('passcode').value)
      if (ok) { setPasscodeVerified(); window.location.href = '/home.html' }
      else {
        document.getElementById('error').style.display = 'block'
        btn.disabled = false
        btn.textContent = 'Enter'
      }
    })
  </script>
</body>
</html>
