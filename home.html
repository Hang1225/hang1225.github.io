<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>首页 — 二十五</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .hero {
      padding: 4rem 0 3rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 3rem;
    }
    .hero-title { font-size: clamp(2.5rem, 6vw, 4.5rem); margin-bottom: 0.5rem; }
    .hero-tagline { font-style: italic; color: var(--muted); font-size: 1.1rem; margin-bottom: 2rem; }
    .hero-actions { display: flex; gap: 1rem; flex-wrap: wrap; }
    .about-text { font-size: 1.08rem; line-height: 1.85; color: var(--text); }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1rem;
      margin-top: 1.5rem;
    }
    .stat {
      text-align: center;
      padding: 1.25rem;
      border: 1px solid var(--border);
      border-radius: 2px;
    }
    .stat-number {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--gold);
      display: block;
    }
    .stat-label { font-size: 0.75rem; color: var(--muted); font-style: italic; }
  </style>
</head>
<body>
  <div id="nav"></div>
  <main>
    <div class="hero fade-in">
      <span class="eyebrow">欢迎</span>
      <h1 class="hero-title">二十五</h1>
      <p class="hero-tagline">精心策划的私人聚会</p>
      <div class="hero-actions">
        <a href="/menu.html" class="btn btn-solid">今晚酒单</a>
        <a href="/openbar.html" class="btn">开放吧</a>
      </div>
    </div>

    <div class="fade-in-2">
      <span class="eyebrow">关于</span>
      <h2 style="margin-bottom:1rem">近一年的精心打磨</h2>
      <p class="about-text">
        二十五是一个近一年的激情项目——一个美酒、挚友与美好对话汇聚的地方。每次聚会都带来全新的精心调制菜单。无论是初次到访还是常客，这里永远欢迎您的到来。
      </p>

      <div class="stats fade-in-3">
        <div class="stat">
          <span class="stat-number">1</span>
          <span class="stat-label">年</span>
        </div>
        <div class="stat">
          <span class="stat-number">∞</span>
          <span class="stat-label">美好时光</span>
        </div>
        <div class="stat">
          <span class="stat-number">◆</span>
          <span class="stat-label">私人俱乐部</span>
        </div>
      </div>
    </div>

    <div class="rule fade-in-4"><span>◆</span></div>

    <div class="fade-in-4" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem">
      <a href="/menu.html" class="card" style="text-decoration:none">
        <span class="eyebrow">今晚</span>
        <h3>酒单</h3>
        <p class="muted" style="margin-top:0.4rem;font-style:italic;font-size:0.95rem">查看今晚精选</p>
      </a>
      <a href="/gallery.html" class="card" style="text-decoration:none">
        <span class="eyebrow">回忆</span>
        <h3>相册</h3>
        <p class="muted" style="margin-top:0.4rem;font-style:italic;font-size:0.95rem">往日美好瞬间</p>
      </a>
      <a href="/community.html" class="card" style="text-decoration:none">
        <span class="eyebrow">宾客</span>
        <h3>社区</h3>
        <p class="muted" style="margin-top:0.4rem;font-style:italic;font-size:0.95rem">宾客的心声</p>
      </a>
      <a href="/openbar.html" class="card" style="text-decoration:none">
        <span class="eyebrow">积分</span>
        <h3>开放吧</h3>
        <p class="muted" style="margin-top:0.4rem;font-style:italic;font-size:0.95rem">带瓶酒，换一杯</p>
      </a>
    </div>
  </main>
  <div id="footer"></div>
  <script type="module">
    import { requirePasscode } from './js/auth.js'
    import { renderNav, renderFooter } from './js/nav.js'
    requirePasscode()
    document.getElementById('nav').innerHTML = renderNav('首页')
    document.getElementById('footer').innerHTML = renderFooter()
  </script>
</body>
</html>
