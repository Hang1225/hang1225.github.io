<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>首页 — 二十五</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .hero {
      padding: 4rem 0 3rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 3rem;
    }
    .hero-title { font-size: clamp(2.5rem, 6vw, 4.5rem); margin-bottom: 0.5rem; }
    .hero-tagline { font-style: italic; color: var(--muted); font-size: 1.1rem; margin-bottom: 2rem; }
    .hero-actions { display: flex; gap: 1rem; flex-wrap: wrap; }
    .about-text { font-size: 1.08rem; line-height: 1.85; color: var(--text); }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1rem;
      margin-top: 1.5rem;
    }
    .stat {
      text-align: center;
      padding: 1.25rem;
      border: 1px solid var(--border);
      border-radius: 2px;
    }
    .stat-number {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--gold);
      display: block;
    }
    .stat-label { font-size: 0.75rem; color: var(--muted); font-style: italic; }
    .home-event-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.9rem 1.2rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      text-decoration: none;
      color: inherit;
    }
    a.home-event-card { cursor: pointer; }
    a.home-event-card:hover { border-color: var(--gold-dim); }
    .home-event-card-date {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.16em;
      color: var(--gold);
      margin-bottom: 0.15rem;
    }
    .home-event-card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      color: var(--cream);
    }
    .home-event-card-badge {
      font-family: 'Cinzel', serif;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 0.2rem 0.5rem;
      white-space: nowrap;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div id="nav"></div>
  <main>
    <div class="hero fade-in">
      <span class="eyebrow" data-zh="欢迎" data-en="Welcome">欢迎</span>
      <h1 class="hero-title">二十五</h1>
      <p class="hero-tagline" data-zh="精心策划的私人聚会" data-en="A private gathering, curated with care">精心策划的私人聚会</p>
      <div class="hero-actions">
        <a href="/menu.html" class="btn btn-solid" data-zh="今晚酒单" data-en="Tonight's Menu">今晚酒单</a>
        <a href="/openbar.html" class="btn" data-zh="OpenBar" data-en="OpenBar">OpenBar</a>
      </div>
    </div>

    <div id="home-events-section" class="fade-in-2" style="display:none;margin-bottom:2.5rem">
      <span class="eyebrow" data-zh="即将举办" data-en="Upcoming">即将举办</span>
      <div id="home-events-list" style="display:flex;flex-direction:column;gap:0.5rem;margin-top:0.75rem"></div>
    </div>

    <div class="fade-in-2">
      <span class="eyebrow" data-zh="关于" data-en="About">关于</span>
      <h2 style="margin-bottom:1rem" data-zh="近一年的精心打磨" data-en="Nearly a year of craft">近一年的精心打磨</h2>
      <p class="about-text" data-zh="二十五是一个近一年的激情项目——一个美酒、挚友与美好对话汇聚的地方。每次聚会都带来全新的精心调制菜单。无论是初次到访还是常客，这里永远欢迎您的到来。" data-en="二十五 has been a passion project nearly a year in the making — a place where good drinks, good company, and good conversation come together. Every occasion brings a fresh menu, handcrafted with care. Whether you're a first-time guest or a regular, you're always welcome here.">
        二十五是一个近一年的激情项目——一个美酒、挚友与美好对话汇聚的地方。每次聚会都带来全新的精心调制菜单。无论是初次到访还是常客，这里永远欢迎您的到来。
      </p>

      <div class="stats fade-in-3">
        <div class="stat">
          <span class="stat-number">1</span>
          <span class="stat-label" data-zh="年" data-en="Year">年</span>
        </div>
        <div class="stat">
          <span class="stat-number">∞</span>
          <span class="stat-label" data-zh="美好时光" data-en="Good Times">美好时光</span>
        </div>
        <div class="stat">
          <span class="stat-number">◆</span>
          <span class="stat-label" data-zh="私人俱乐部" data-en="Private Club">私人俱乐部</span>
        </div>
      </div>
    </div>

    <div class="rule fade-in-4"><span>◆</span></div>

    <div class="fade-in-4" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem">
      <a href="/menu.html" class="card" style="text-decoration:none">
        <span class="eyebrow" data-zh="今晚" data-en="Tonight">今晚</span>
        <h3 data-zh="酒单" data-en="The Menu">酒单</h3>
        <p class="muted" style="margin-top:0.4rem;font-style:italic;font-size:0.95rem" data-zh="查看今晚精选" data-en="See what's being crafted">查看今晚精选</p>
      </a>
      <a href="/community.html" class="card" style="text-decoration:none">
        <span class="eyebrow" data-zh="宾客" data-en="Guests">宾客</span>
        <h3 data-zh="社区" data-en="Community">社区</h3>
        <p class="muted" style="margin-top:0.4rem;font-style:italic;font-size:0.95rem" data-zh="宾客的心声" data-en="What guests have said">宾客的心声</p>
      </a>
      <a href="/openbar.html" class="card" style="text-decoration:none">
        <span class="eyebrow" data-zh="Open Bar" data-en="Open Bar">Open Bar</span>
        <h3 data-zh="Open Bar" data-en="Open Bar">Open Bar</h3>
        <p class="muted" style="margin-top:0.4rem;font-style:italic;font-size:0.95rem" data-zh="查看愿望单，登录账户" data-en="Browse the wishlist and sign in to your account">查看愿望单，登录账户</p>
      </a>
    </div>
  </main>
  <div id="footer"></div>
  <script type="module">
    import { requirePasscode } from './js/auth.js'
    import { renderNav, renderFooter, initLang } from './js/nav.js'
    import { loadEvents, formatTimeRange } from './js/events.js'
    requirePasscode()
    document.getElementById('nav').innerHTML = renderNav('首页')
    document.getElementById('footer').innerHTML = renderFooter()
    initLang()

    function escapeHtml(str) {
      if (!str) return ''
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')
    }

    function formatHomeEventDate(dateStr) {
      const d = new Date(dateStr + 'T12:00:00')
      const days = ['SUN','MON','TUE','WED','THU','FRI','SAT']
      const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC']
      return `${days[d.getDay()]} · ${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`
    }

    async function renderHomeEvents() {
      const today = new Date().toISOString().split('T')[0]
      const allEvents = await loadEvents()
      const upcoming = allEvents.filter(e => e.event_date >= today)

      const section = document.getElementById('home-events-section')
      const list = document.getElementById('home-events-list')

      if (!upcoming.length) return // section stays hidden

      list.innerHTML = ''
      upcoming.forEach(ev => {
        const isOpenBar = ev.event_type === 'open'
        const timeRange = formatTimeRange(ev.start_time, ev.end_time)
        const dateStr = escapeHtml(formatHomeEventDate(ev.event_date)) + (timeRange ? ' · ' + timeRange : '')
        const badgeText = isOpenBar ? 'Open Bar' : 'Home Bar'

        const card = document.createElement(isOpenBar ? 'a' : 'div')
        card.className = 'home-event-card'
        if (isOpenBar) card.href = '/openbar.html'
        card.innerHTML = `
          <div>
            <div class="home-event-card-date">${dateStr}</div>
            <div class="home-event-card-title">${escapeHtml(ev.title)}</div>
          </div>
          <span class="home-event-card-badge">${badgeText}</span>
        `
        list.appendChild(card)
      })

      section.style.display = 'block'
    }

    renderHomeEvents()
  </script>
</body>
</html>
