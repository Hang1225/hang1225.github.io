<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>酒单 — 二十五</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .menu-list {
      max-width: 580px;
      margin: 0 auto;
    }

    .drink-entry {
      display: grid;
      grid-template-columns: 36px 1fr auto;
      gap: 0 1.6rem;
      padding: 2rem 0;
      border-bottom: 1px solid rgba(201,168,76,0.06);
      align-items: center;
    }
    .drink-entry:last-child { border-bottom: none; }

    .gauge-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      align-self: stretch;
      justify-content: center;
    }
    .gauge-track {
      width: 2px;
      flex: 1;
      min-height: 80px;
      max-height: 120px;
      background: rgba(201,168,76,0.08);
      border-radius: 2px;
      position: relative;
    }
    .gauge-fill {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(to top, var(--gold), rgba(201,168,76,0.3));
      border-radius: 2px;
    }
    .gauge-label {
      font-family: 'Cinzel', serif;
      font-size: 0.42rem;
      letter-spacing: 0.1em;
      color: rgba(201,168,76,0.4);
      white-space: nowrap;
    }

    .drink-name {
      font-family: 'Playfair Display', 'Noto Serif SC', serif;
      color: var(--cream);
      font-size: 1.15rem;
      font-weight: 400;
      margin-bottom: 0.3rem;
    }
    .drink-desc {
      color: var(--muted);
      font-style: italic;
      font-size: 0.78rem;
      line-height: 1.55;
      margin-bottom: 0.55rem;
    }
    .drink-tags {
      display: flex;
      gap: 0.3rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .abv-badge {
      font-family: 'Cinzel', serif;
      font-size: 0.5rem;
      letter-spacing: 0.14em;
      color: var(--gold);
      border: 1px solid var(--gold-dim);
      padding: 1px 6px;
      border-radius: 2px;
    }
    .flavor-tag {
      font-size: 0.58rem;
      color: var(--muted);
      background: rgba(201,168,76,0.04);
      border: 1px solid rgba(201,168,76,0.1);
      border-radius: 2px;
      padding: 1px 5px;
    }

    .vote-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
      min-width: 32px;
    }
    .heart-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      color: rgba(106,94,74,0.4);
      line-height: 1;
      padding: 0;
      transition: color 0.2s;
    }
    .heart-btn.voted { color: var(--gold); }
    .vote-count {
      font-family: 'Cinzel', serif;
      font-size: 0.46rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
    .vote-count.voted { color: var(--gold); }

    .vote-confirm {
      display: none;
      margin-top: 0.4rem;
      text-align: center;
      animation: fadeIn 0.15s ease both;
    }
    .vote-confirm.open { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; } }
    .confirm-text {
      font-size: 0.62rem;
      color: var(--text);
      font-style: italic;
      margin-bottom: 0.35rem;
      line-height: 1.4;
    }
    .confirm-btns { display: flex; gap: 0.4rem; justify-content: center; }
    .confirm-yes, .confirm-no {
      font-family: 'Cinzel', serif;
      font-size: 0.46rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border: 1px solid rgba(201,168,76,0.25);
      background: none;
      color: var(--muted);
      padding: 2px 8px;
      border-radius: 2px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .confirm-yes:hover { color: var(--gold); border-color: var(--gold-dim); }
    .confirm-no:hover { color: var(--cream); }
    .vote-msg {
      font-size: 0.6rem;
      font-style: italic;
      margin-top: 0.3rem;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .vote-msg.show { opacity: 1; }
    .vote-msg.error { color: var(--red); }
    .vote-msg.info { color: var(--muted); }

    .no-event-note {
      text-align: center;
      color: var(--muted);
      font-style: italic;
      font-size: 0.82rem;
      margin-top: 2rem;
    }
  </style>
</head>
<body>
  <div id="nav"></div>
  <main>
    <div class="page-header fade-in">
      <span class="eyebrow" data-zh="今晚精选" data-en="Tonight's Selection">今晚精选</span>
      <h1 data-zh="酒单" data-en="The Menu">酒单</h1>
    </div>

    <div id="menu-list" class="menu-list fade-in-2"></div>
  </main>
  <div id="footer"></div>

  <script type="module">
    import { requirePasscode, getAttendeeSession } from './js/auth.js'
    import { renderNav, renderFooter, initLang } from './js/nav.js'
    import { loadEvents } from './js/events.js'
    import { loadDrinks, loadAllVotes, getMyVote, submitVote } from './js/menu.js'
    import { t } from './js/i18n.js'

    requirePasscode()
    document.getElementById('nav').innerHTML = renderNav('酒单')
    document.getElementById('footer').innerHTML = renderFooter()
    initLang()

    function escapeHtml(str) {
      if (!str) return ''
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;')
    }

    function resolveCurrentEvent(events) {
      const now = Date.now()
      const WINDOW_MS = 36 * 60 * 60 * 1000
      return events
        .filter(e => {
          // loadEvents() already excludes cancelled/closed at the DB layer
          if (!e.start_time) return false
          // Parsed as local time (no Z/offset) — correct for co-located host and guests
          const dt = new Date(`${e.event_date}T${e.start_time}`)
          return dt.getTime() <= now && now < dt.getTime() + WINDOW_MS
        })
        .sort((a, b) => new Date(b.event_date) - new Date(a.event_date))[0] ?? null
    }

    function buildEntry(drink, voteCount, isMyVote, showVoting) {
      const entry = document.createElement('div')
      entry.className = 'drink-entry'
      entry.dataset.drinkId = drink.id
      entry.dataset.drinkName = drink.name

      const fillPct = drink.abv != null ? Math.min(drink.abv / 40, 1) * 100 : 0
      const gaugeHtml = `
        <div class="gauge-wrap">
          <div class="gauge-track">
            <div class="gauge-fill" style="height:${fillPct}%"></div>
          </div>
          ${drink.abv != null ? `<span class="gauge-label">${drink.abv}%</span>` : ''}
        </div>`

      const abvBadge = drink.abv != null ? `<span class="abv-badge">ABV ${drink.abv}%</span>` : ''
      const flavorTags = (drink.flavors || []).map(f => `<span class="flavor-tag">${escapeHtml(f)}</span>`).join('')

      const infoHtml = `
        <div class="drink-info">
          <div class="drink-name">${escapeHtml(drink.name)}</div>
          ${drink.description ? `<div class="drink-desc">${escapeHtml(drink.description)}</div>` : ''}
          <div class="drink-tags">${abvBadge}${flavorTags}</div>
        </div>`

      let voteHtml = ''
      if (showVoting) {
        // Note: if guest clicks heart on their already-voted drink, submitVote deletes
        // and re-inserts the same vote — a no-op with a small extra round-trip.
        voteHtml = `
          <div class="vote-col">
            <button class="heart-btn ${isMyVote ? 'voted' : ''}" aria-label="${t('投票', 'Vote')}">${isMyVote ? '♥' : '♡'}</button>
            <span class="vote-count ${isMyVote ? 'voted' : ''}">${voteCount}</span>
            <div class="vote-confirm">
              <div class="confirm-text">${t('确认投给', 'Vote for')} 「${escapeHtml(drink.name)}」？</div>
              <div class="confirm-btns">
                <button class="confirm-yes">${t('确认', 'Yes')}</button>
                <button class="confirm-no">${t('取消', 'Cancel')}</button>
              </div>
              <div class="vote-msg error">${t('出现错误，请重试', 'Something went wrong')}</div>
            </div>
          </div>`
      }

      entry.innerHTML = gaugeHtml + infoHtml + voteHtml
      return entry
    }


    const attendee = getAttendeeSession()
    const [events, drinks, voteCounts] = await Promise.all([
      loadEvents(),
      loadDrinks(),
      loadAllVotes(),
    ])

    const currentEvent = resolveCurrentEvent(events)
    const showVoting = currentEvent != null
    const list = document.getElementById('menu-list')

    let myVoteDrinkId = null
    if (attendee && currentEvent) {
      myVoteDrinkId = await getMyVote(attendee.id, currentEvent.id)
    }

    if (drinks.length === 0) {
      list.innerHTML = `<p class="muted" style="font-style:italic">${t('暂无酒单，敬请期待', 'No menu yet — check back soon.')}</p>`
    } else {
      for (const drink of drinks) {
        const count = voteCounts.get(drink.id) ?? 0
        const isMyVote = myVoteDrinkId === drink.id
        list.appendChild(buildEntry(drink, count, isMyVote, showVoting))
      }

      if (!showVoting) {
        const note = document.createElement('p')
        note.className = 'no-event-note'
        note.textContent = t('投票将在活动期间开放', 'Voting opens during events')
        list.appendChild(note)
      }
    }

    list.addEventListener('click', async e => {
      const heartBtn = e.target.closest('.heart-btn')
      if (heartBtn) {
        const entry = heartBtn.closest('.drink-entry')

        if (!attendee) {
          const msgEl = entry.querySelector('.vote-msg')
          if (!msgEl) return
          msgEl.textContent = t('请先登录以投票', 'Please log in to vote')
          msgEl.classList.add('show', 'info')
          setTimeout(() => { msgEl.classList.remove('show', 'info'); msgEl.textContent = '' }, 3000)
          return
        }

        entry.querySelector('.vote-confirm').classList.toggle('open')
        return
      }

      if (e.target.closest('.confirm-no')) {
        e.target.closest('.vote-confirm').classList.remove('open')
        return
      }

      if (e.target.closest('.confirm-yes')) {
        const entry = e.target.closest('.drink-entry')
        const drinkId = entry.dataset.drinkId
        const confirm = entry.querySelector('.vote-confirm')
        const msgEl = entry.querySelector('.vote-msg')

        const result = await submitVote(drinkId, attendee.id, currentEvent.id)

        if (!result.ok) {
          confirm.classList.remove('open')
          msgEl.textContent = t('出现错误，请重试', 'Something went wrong')
          msgEl.classList.add('show', 'error')
          setTimeout(() => msgEl.classList.remove('show', 'error'), 3000)
          return
        }

        confirm.classList.remove('open')

        if (result.previousDrinkId && result.previousDrinkId !== drinkId) {
          const oldEntry = list.querySelector(`[data-drink-id="${result.previousDrinkId}"]`)
          if (oldEntry) {
            oldEntry.querySelector('.heart-btn').classList.remove('voted')
            oldEntry.querySelector('.heart-btn').textContent = '♡'
            const oldCount = oldEntry.querySelector('.vote-count')
            oldCount.textContent = Math.max(0, parseInt(oldCount.textContent, 10) - 1)
            oldCount.classList.remove('voted')
          }
        }

        const heart = entry.querySelector('.heart-btn')
        const countEl = entry.querySelector('.vote-count')
        if (!heart.classList.contains('voted')) {
          countEl.textContent = parseInt(countEl.textContent, 10) + 1
        }
        heart.classList.add('voted')
        heart.textContent = '♥'
        countEl.classList.add('voted')

        myVoteDrinkId = drinkId
      }
    })
  </script>
</body>
</html>
