<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>酒单 — 二十五</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .drinks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.25rem;
      margin-bottom: 3rem;
    }
    .drink-card {
      position: relative;
      cursor: default;
    }
    .drink-card img {
      width: 100%;
      height: 170px;
      object-fit: cover;
      border-radius: 2px;
      margin-bottom: 1rem;
      display: block;
      filter: brightness(0.85) saturate(0.9);
      transition: filter 0.3s;
    }
    .drink-card:hover img { filter: brightness(1) saturate(1); }
    .drink-card h3 { color: var(--cream); margin-bottom: 0.35rem; }
    .drink-desc { color: var(--muted); font-size: 0.95rem; line-height: 1.55; font-style: italic; }
    .comments-trigger {
      display: inline-block;
      font-family: 'Cinzel', serif;
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold);
      margin-top: 0.75rem;
      cursor: pointer;
      border-bottom: 1px solid var(--gold-dim, rgba(201,168,76,0.35));
      padding-bottom: 1px;
      background: none;
      border-left: none;
      border-right: none;
      border-top: none;
    }
    .comments-tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 10px);
      left: 0; right: 0;
      background: var(--surface-2, #131322);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 1rem;
      z-index: 20;
      font-size: 0.9rem;
      max-height: 220px;
      overflow-y: auto;
      box-shadow: 0 -8px 32px rgba(0,0,0,0.6);
    }
    .drink-card:hover .comments-tooltip { display: block; animation: fadeUp 0.2s ease both; }
    .comment-entry { padding: 0.6rem 0; border-bottom: 1px solid rgba(201,168,76,0.08); }
    .comment-entry:last-child { border: none; padding-bottom: 0; }
    .comment-author { color: var(--gold); font-size: 0.8rem; font-family: 'Cinzel', serif; letter-spacing: 0.1em; margin-bottom: 0.2rem; }
    .comment-body { color: var(--text); font-style: italic; line-height: 1.5; }
    select {
      width: 100%;
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(201,168,76,0.14);
      border-radius: 2px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      margin-bottom: 0.85rem;
      outline: none;
    }
    select:focus { border-color: var(--gold-dim, rgba(201,168,76,0.35)); }
  </style>
</head>
<body>
  <div id="nav"></div>
  <main>
    <div class="page-header fade-in">
      <span class="eyebrow">今晚精选</span>
      <h1>酒单</h1>
      <p>悬停查看宾客评论</p>
    </div>

    <div id="drinks-grid" class="drinks-grid fade-in-2"></div>

    <div class="rule fade-in-3"><span>◆</span></div>

    <div class="card fade-in-3">
      <span class="eyebrow">留下您的评论</span>
      <h2 style="margin-bottom:1.25rem">评论</h2>
      <input type="text" id="comment-author" placeholder="您的名字（可选）">
      <label>评论哪款酒？</label>
      <select id="comment-drink"></select>
      <textarea id="comment-body" rows="3" placeholder="您觉得这款酒怎么样？"></textarea>
      <button class="btn btn-solid" id="submit-comment">提交</button>
      <span id="comment-status"></span>
    </div>
  </main>
  <div id="footer"></div>
  <script type="module">
    import { requirePasscode } from './js/auth.js'
    import { renderNav, renderFooter } from './js/nav.js'
    import { loadDrinks, loadCommentsForDrink, submitComment } from './js/menu.js'

    requirePasscode()
    document.getElementById('nav').innerHTML = renderNav('酒单')
    document.getElementById('footer').innerHTML = renderFooter()

    function escapeHtml(str) {
      if (!str) return ''
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')
    }

    const drinks = await loadDrinks()
    const grid = document.getElementById('drinks-grid')
    const select = document.getElementById('comment-drink')

    if (drinks.length === 0) {
      grid.innerHTML = '<p class="muted" style="font-style:italic">暂无酒单，敬请期待</p>'
    }

    for (const drink of drinks) {
      const comments = await loadCommentsForDrink(drink.id)

      const commentsHtml = comments.length
        ? comments.map(c => `
          <div class="comment-entry">
            <div class="comment-author">${escapeHtml(c.author_name) || 'Anonymous'}</div>
            <div class="comment-body">${escapeHtml(c.body)}</div>
          </div>`).join('')
        : '<p class="muted" style="font-style:italic;margin:0">暂无评论</p>'

      const card = document.createElement('div')
      card.className = 'card drink-card'
      card.innerHTML = `
        ${drink.photo_url ? `<img src="${escapeHtml(drink.photo_url)}" alt="${escapeHtml(drink.name)}" loading="lazy">` : ''}
        <h3>${escapeHtml(drink.name)}</h3>
        <p class="drink-desc">${escapeHtml(drink.description)}</p>
        <div class="comments-tooltip">${commentsHtml}</div>
      `
      grid.appendChild(card)

      const opt = document.createElement('option')
      opt.value = drink.id
      opt.textContent = drink.name
      select.appendChild(opt)
    }

    document.getElementById('submit-comment').addEventListener('click', async () => {
      const author = document.getElementById('comment-author').value.trim()
      const drinkId = document.getElementById('comment-drink').value
      const body = document.getElementById('comment-body').value.trim()
      const status = document.getElementById('comment-status')
      if (!body) { status.textContent = '请写下您的评论'; status.className = 'error'; return }
      if (!drinkId) { status.textContent = '暂无饮品'; status.className = 'error'; return }
      const ok = await submitComment(drinkId, author || null, body)
      if (ok) {
        status.textContent = '感谢评论，待审核后显示'
        status.className = 'success'
        document.getElementById('comment-body').value = ''
      } else {
        status.textContent = '出现错误，请重试'
        status.className = 'error'
      }
    })
  </script>
</body>
</html>
