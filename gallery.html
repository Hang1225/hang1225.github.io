<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery — The Homebar</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 1rem;
      margin-bottom: 2.5rem;
    }
    .photo-item {}
    .photo-item img {
      width: 100%;
      height: 190px;
      object-fit: cover;
      border-radius: 2px;
      display: block;
      filter: brightness(0.88) saturate(0.85);
      transition: filter 0.3s, transform 0.3s;
    }
    .photo-item:hover img { filter: brightness(1) saturate(1); transform: scale(1.01); }
    .photo-item .caption {
      margin-top: 0.5rem;
      font-size: 0.88rem;
      color: var(--muted);
      font-style: italic;
    }
  </style>
</head>
<body>
  <div id="nav"></div>
  <main>
    <div class="page-header fade-in">
      <span class="eyebrow">Memories</span>
      <h1>Gallery</h1>
      <p>Moments captured by our guests</p>
    </div>

    <div id="photo-grid" class="photo-grid fade-in-2"></div>

    <div class="rule fade-in-3"><span>◆</span></div>

    <div class="card fade-in-3">
      <span class="eyebrow">Contribute</span>
      <h2 style="margin-bottom:1.25rem">Share a Memory</h2>
      <p class="muted" style="margin-bottom:1.25rem;font-style:italic">Photos are reviewed before appearing in the gallery.</p>
      <label>Select Photo</label>
      <input type="file" id="photo-file" accept="image/*">
      <label>Caption</label>
      <input type="text" id="photo-caption" placeholder="Describe the moment (optional)">
      <button class="btn btn-solid" id="upload-btn">Upload Photo</button>
      <span id="upload-status"></span>
    </div>
  </main>
  <script type="module">
    import { requirePasscode } from './js/auth.js'
    import { renderNav } from './js/nav.js'
    import { loadApprovedPhotos, uploadPhoto } from './js/gallery.js'

    requirePasscode()
    document.getElementById('nav').innerHTML = renderNav('Gallery')

    const photos = await loadApprovedPhotos()
    const grid = document.getElementById('photo-grid')

    if (photos.length === 0) {
      grid.innerHTML = '<p class="muted" style="font-style:italic">No photos yet — be the first to share a memory.</p>'
    } else {
      photos.forEach(p => {
        const div = document.createElement('div')
        div.className = 'photo-item'
        const img = document.createElement('img')
        img.src = p.url
        img.alt = p.caption || 'Gallery photo'
        img.loading = 'lazy'
        div.appendChild(img)
        if (p.caption) {
          const cap = document.createElement('p')
          cap.className = 'caption'
          cap.textContent = p.caption
          div.appendChild(cap)
        }
        grid.appendChild(div)
      })
    }

    document.getElementById('upload-btn').addEventListener('click', async () => {
      const file = document.getElementById('photo-file').files[0]
      const caption = document.getElementById('photo-caption').value.trim()
      const status = document.getElementById('upload-status')
      const btn = document.getElementById('upload-btn')
      if (!file) { status.textContent = 'Please select a photo.'; status.className = 'error'; return }
      btn.disabled = true; btn.textContent = 'Uploading...'
      const ok = await uploadPhoto(file, caption)
      btn.disabled = false; btn.textContent = 'Upload Photo'
      if (ok) {
        status.textContent = 'Uploaded — your photo is pending approval.'
        status.className = 'success'
        document.getElementById('photo-file').value = ''
        document.getElementById('photo-caption').value = ''
      } else {
        status.textContent = 'Upload failed. Please try again.'
        status.className = 'error'
      }
    })
  </script>
</body>
</html>
