<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>相册 — 二十五</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 1rem;
      margin-bottom: 2.5rem;
    }
    .photo-item {}
    .photo-item img {
      width: 100%;
      height: 190px;
      object-fit: cover;
      border-radius: 2px;
      display: block;
      filter: brightness(0.88) saturate(0.85);
      transition: filter 0.3s, transform 0.3s;
    }
    .photo-item:hover img { filter: brightness(1) saturate(1); transform: scale(1.01); }
    .photo-item .caption {
      margin-top: 0.5rem;
      font-size: 0.88rem;
      color: var(--muted);
      font-style: italic;
    }
  </style>
</head>
<body>
  <div id="nav"></div>
  <main>
    <div class="page-header fade-in">
      <span class="eyebrow">回忆</span>
      <h1>相册</h1>
      <p>宾客记录的美好瞬间</p>
    </div>

    <div id="photo-grid" class="photo-grid fade-in-2"></div>

    <div class="rule fade-in-3"><span>◆</span></div>

    <div class="card fade-in-3">
      <span class="eyebrow">分享</span>
      <h2 style="margin-bottom:1.25rem">分享记忆</h2>
      <p class="muted" style="margin-bottom:1.25rem;font-style:italic">照片经审核后方可显示</p>
      <label>选择照片</label>
      <input type="file" id="photo-file" accept="image/*">
      <label>图片说明</label>
      <input type="text" id="photo-caption" placeholder="描述这一刻（可选）">
      <button class="btn btn-solid" id="upload-btn">上传照片</button>
      <span id="upload-status"></span>
    </div>
  </main>
  <div id="footer"></div>
  <script type="module">
    import { requirePasscode } from './js/auth.js'
    import { renderNav, renderFooter } from './js/nav.js'
    import { loadApprovedPhotos, uploadPhoto } from './js/gallery.js'

    requirePasscode()
    document.getElementById('nav').innerHTML = renderNav('相册')
    document.getElementById('footer').innerHTML = renderFooter()

    const photos = await loadApprovedPhotos()
    const grid = document.getElementById('photo-grid')

    if (photos.length === 0) {
      grid.innerHTML = '<p class="muted" style="font-style:italic">暂无照片，成为第一个分享的人</p>'
    } else {
      photos.forEach(p => {
        const div = document.createElement('div')
        div.className = 'photo-item'
        const img = document.createElement('img')
        img.src = p.url
        img.alt = p.caption || 'Gallery photo'
        img.loading = 'lazy'
        div.appendChild(img)
        if (p.caption) {
          const cap = document.createElement('p')
          cap.className = 'caption'
          cap.textContent = p.caption
          div.appendChild(cap)
        }
        grid.appendChild(div)
      })
    }

    document.getElementById('upload-btn').addEventListener('click', async () => {
      const file = document.getElementById('photo-file').files[0]
      const caption = document.getElementById('photo-caption').value.trim()
      const status = document.getElementById('upload-status')
      const btn = document.getElementById('upload-btn')
      if (!file) { status.textContent = '请选择照片'; status.className = 'error'; return }
      btn.disabled = true; btn.textContent = '上传中...'
      const ok = await uploadPhoto(file, caption)
      btn.disabled = false; btn.textContent = '上传照片'
      if (ok) {
        status.textContent = '上传成功，待审核后显示'
        status.className = 'success'
        document.getElementById('photo-file').value = ''
        document.getElementById('photo-caption').value = ''
      } else {
        status.textContent = '上传失败，请重试'
        status.className = 'error'
      }
    })
  </script>
</body>
</html>
